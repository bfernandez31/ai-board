# Cleanup Workflow - Diff-Based Technical Debt Analysis
# Analyzes all changes since last cleanup merge, not per-branch

name: Cleanup Workflow

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Cleanup ticket identifier (e.g., AIB-123)'
        required: true
        type: string

      project_id:
        description: 'Project ID for API calls'
        required: true
        type: string

      job_id:
        description: 'Job ID for status tracking'
        required: true
        type: string

      githubRepository:
        description: 'GitHub repository in format owner/repo'
        required: true
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      pull-requests: write

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_board_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_board_test

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Cleanup workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  project_id: ${{ inputs.project_id }}"
          echo "  githubRepository: ${{ inputs.githubRepository }}"

      - name: Update Job Status - Running
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.githubRepository }}
          ref: main
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0  # Full history for diff analysis

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Setup Test Environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "🔧 Setting up test environment..."
          if [ -f ".github/scripts/setup-test-env.sh" ]; then
            .github/scripts/setup-test-env.sh
          fi

      - name: Install Playwright
        run: |
          if [ -f "package.json" ] && grep -q '"@playwright/test"' package.json; then
            bunx playwright install --with-deps chromium
          fi

      - name: Install Claude Code CLI
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      # Find the merge commit of the last cleanup (discovered from git)
      - name: Find Last Cleanup Merge Point
        id: find-merge
        run: |
          # Try to find last cleanup merge from git history
          MERGE_SHA=$(git log --merges --grep="cleanup-" --format="%H" -1 2>/dev/null || echo "")

          if [ -z "$MERGE_SHA" ]; then
            # First cleanup - use initial commit
            MERGE_SHA=$(git rev-list --max-parents=0 HEAD | tail -1)
            echo "📍 First cleanup - using initial commit: $MERGE_SHA"
          else
            echo "📍 Last cleanup merge point: $MERGE_SHA"
          fi

          echo "merge_sha=$MERGE_SHA" >> $GITHUB_OUTPUT

      # Create cleanup branch using the script
      - name: Create Cleanup Branch
        id: create-branch
        run: |
          MERGE_SHA="${{ steps.find-merge.outputs.merge_sha }}"

          # Use the create-new-feature script with cleanup mode
          RESULT=$(.specify/scripts/bash/create-new-feature.sh --json --mode=cleanup "Clean $(date +%Y-%m-%d)")

          CLEANUP_BRANCH=$(echo "$RESULT" | jq -r '.BRANCH_NAME')
          SPEC_DIR=$(dirname "$(echo "$RESULT" | jq -r '.SPEC_FILE')")

          echo "branch=$CLEANUP_BRANCH" >> $GITHUB_OUTPUT
          echo "spec_dir=$SPEC_DIR" >> $GITHUB_OUTPUT
          echo "📋 Created cleanup branch: $CLEANUP_BRANCH"
          echo "📁 Spec directory: $SPEC_DIR"

          # Store merge point for Claude to discover
          echo "MERGE_POINT=$MERGE_SHA" >> "$GITHUB_ENV"

          # Show diff statistics for logging
          echo "📊 Diff statistics since $MERGE_SHA:"
          git diff --stat "$MERGE_SHA"..HEAD 2>/dev/null | head -20 || echo "Unable to get diff stats"

      # Execute Claude cleanup command (no JSON - Claude reads context from CLAUDE.md)
      - name: Execute Cleanup Analysis
        id: cleanup
        run: |
          echo "🧹 Starting cleanup analysis..."
          echo "📍 Merge point: $MERGE_POINT"

          # Claude will read CLAUDE.md and constitution for project context
          # Claude will use cleanup-tasks.md to track progress
          claude --dangerously-skip-permissions --model opus "/cleanup ultrathink IMPORTANT: never run the full test suite, only impacted tests" || {
            echo "❌ Cleanup execution failed"
            exit 1
          }

          echo "✅ Cleanup analysis complete"

      # Commit and push changes
      - name: Commit and Push Changes
        run: |
          CLEANUP_BRANCH="${{ steps.create-branch.outputs.branch }}"

          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to commit (Claude may have already committed or no issues found)"
          else
            git commit -m "chore(ticket-${{ inputs.ticket_id }}): cleanup - automated analysis" \
              -m "Generated by GitHub Actions workflow (cleanup)" \
              -m "Ticket: ${{ inputs.ticket_id }}" \
              -m "Branch: ${CLEANUP_BRANCH}"
            echo "✅ Changes committed"
          fi

          # Always push (Claude may have committed during /cleanup execution)
          git push origin "$CLEANUP_BRANCH"
          echo "✅ Changes pushed to branch: ${CLEANUP_BRANCH}"

      # Update ticket branch
      - name: Update Ticket Branch
        if: success()
        run: |
          CLEANUP_BRANCH="${{ steps.create-branch.outputs.branch }}"
          curl -X PATCH "${APP_URL}/api/projects/${{ inputs.project_id }}/tickets/${{ inputs.ticket_id }}/branch" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"branch\": \"${CLEANUP_BRANCH}\"}" \
            -f -s -S || echo "⚠️ Failed to update ticket branch field"

          echo "✅ Updated ticket branch to: ${CLEANUP_BRANCH}"

      # Update job status - Completed
      - name: Update Job Status - Completed
        if: success()
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      # Transition to VERIFY (triggers verify workflow which runs tests and creates PR)
      - name: Transition to VERIFY
        if: success()
        run: |
          echo "🔄 Transitioning ticket to VERIFY stage..."
          echo "   This will trigger the verify workflow to run tests and create PR"
          .specify/scripts/bash/transition-to-verify.sh \
            "${{ inputs.ticket_id }}" \
            "${{ inputs.project_id }}" \
            "${APP_URL}" \
            "${WORKFLOW_API_TOKEN}"

      # Update job status - Failed
      - name: Update Job Status - Failed
        if: failure()
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to FAILED"
