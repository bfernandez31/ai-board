name: Quick Implementation Workflow
# Fast-track workflow for simple tasks bypassing SPECIFY and PLAN stages

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket identifier (e.g., 016, PROJ-123)'
        required: true
        type: string

      ticketTitle:
        description: 'Ticket title for implementation context'
        required: true
        type: string

      ticketDescription:
        description: 'Detailed ticket description'
        required: false
        type: string
        default: ''

      attachments:
        description: 'JSON array of ticket attachments (images for Claude context)'
        required: false
        type: string
        default: '[]'

      job_id:
        description: 'Job ID for status tracking (optional)'
        required: false
        type: string
        default: ''

      project_id:
        description: 'Project ID for API calls'
        required: true
        type: string

jobs:
  quick-impl:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Shorter timeout for quick-impl (vs 120 for full spec-kit)

    permissions:
      contents: write
      pull-requests: write

    # PostgreSQL service container for testing
    # Health checks ensure database is ready before test execution
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_board_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SKIP_EXECUTION: ${{ contains(inputs.ticketTitle, '[e2e]') }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      # Database connection string for test environment
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_board_test

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Debug workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  project_id: ${{ inputs.project_id }}"
          echo "  ticketTitle: ${{ inputs.ticketTitle }}"

      - name: Report E2E Skip
        if: ${{ env.SKIP_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ '[e2e]' detected in ticket title; skipping execution to preserve resources"

      - name: Update Job Status - Running
        if: ${{ inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Checkout repository
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: main  # Always start from main for quick-impl
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup Python
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: bun install --frozen-lockfile

      - name: Install Claude Code CLI
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Setup Test Environment
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "🔧 Setting up test environment..."
          .github/scripts/setup-test-env.sh

      - name: Prepare Images for Claude
        if: ${{ env.SKIP_EXECUTION != 'true' && inputs.attachments != '[]' }}
        run: |
          set -e

          # Call reusable script to download and prepare images
          IMAGE_PATHS=$(.specify/scripts/bash/prepare-images.sh \
            "${{ inputs.ticket_id }}" \
            '${{ inputs.attachments }}')

          # Store image paths for Claude execution step
          echo "IMAGE_PATHS=$IMAGE_PATHS" >> "$GITHUB_ENV"
          echo "IMAGE_COUNT=$(echo $IMAGE_PATHS | wc -w | tr -d ' ')" >> "$GITHUB_ENV"

      # Database setup steps
      - name: Generate Prisma Client
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: npx prisma generate

      - name: Apply Database Migrations
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: npx prisma migrate deploy

      - name: Seed Test Database
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: npx tsx tests/global-setup.ts

      # Playwright setup steps
      - name: Get Playwright Version
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: ${{ env.SKIP_EXECUTION != 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Execute Quick Implementation
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: |
          # Execute /quick-impl command with ticket title and description
          # Command will internally call create-new-feature.sh --mode=quick-impl
          ticket_id="${{ inputs.ticket_id }}"
          ticket_title="${{ inputs.ticketTitle }}"
          ticket_description="${{ inputs.ticketDescription }}"

          printf -v prompt '/quick-impl #%s %s\n%s\n' "$ticket_id" "$ticket_title" "$ticket_description"

          # Add image paths if available
          if [ -n "$IMAGE_PATHS" ] && [ "$IMAGE_COUNT" -gt 0 ]; then
            echo "🖼️  Passing $IMAGE_COUNT images to Claude for visual context"
            claude --dangerously-skip-permissions "$prompt IMPORTANT: never prompt me; you must do the full implementation, never run the full test suite, only impacted tests" $IMAGE_PATHS
          else
            claude --dangerously-skip-permissions "$prompt IMPORTANT: never prompt me; you must do the full implementation, never run the full test suite, only impacted tests"
          fi

      - name: Capture Branch Name
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: |
          # Capture the branch created by /quick-impl command
          current_branch="$(git rev-parse --abbrev-ref HEAD)"
          echo "FEATURE_BRANCH=$current_branch" >> "$GITHUB_ENV"
          echo "✅ Feature branch: $current_branch"

      - name: Cleanup Temporary Images Before Commit
        if: ${{ env.SKIP_EXECUTION != 'true' && env.IMAGE_COUNT != '' && env.IMAGE_COUNT != '0' }}
        run: |
          echo "🧹 Cleaning up temporary image files before commit..."
          TICKET_ASSETS_DIR="ticket-assets/${{ inputs.ticket_id }}"
          if [ -d "$TICKET_ASSETS_DIR" ]; then
            rm -rf "$TICKET_ASSETS_DIR"
            echo "  ✅ Removed temporary directory: $TICKET_ASSETS_DIR"
          fi
          echo "✅ Cleanup complete (images remain in Cloudinary)"

      # Documentation update removed - now handled in verify workflow
      # Global documentation is updated only once before PR creation (verify stage)
      # This avoids:
      # - Multiple doc commits during spec iterations
      # - Conflicts on global documentation files
      # - Outdated docs during development phases

      - name: Commit and Push Changes
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: |
          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to commit (Claude may have already committed)"
          else
            git commit -m "feat(ticket-${{ inputs.ticket_id }}): quick-impl - automated implementation" \
              -m "Generated by GitHub Actions workflow (quick-impl)" \
              -m "Ticket: ${{ inputs.ticket_id }}" \
              -m "Title: ${{ inputs.ticketTitle }}" \
              -m "Branch: ${FEATURE_BRANCH}"
            echo "✅ Changes committed"
          fi

          # Always push (Claude may have committed during /quick-impl execution)
          git push origin "$FEATURE_BRANCH"
          echo "✅ Changes pushed to branch: ${FEATURE_BRANCH}"

      - name: Update Ticket Branch
        if: ${{ success() && env.SKIP_EXECUTION != 'true' && env.FEATURE_BRANCH != '' }}
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          # Update ticket branch field via API
          curl -X PATCH "${APP_URL}/api/projects/${PROJECT_ID}/tickets/${TICKET_ID}/branch" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"branch\": \"${FEATURE_BRANCH}\"}" \
            -f -s -S || echo "⚠️ Failed to update ticket branch field"

          echo "✅ Updated ticket branch to: ${FEATURE_BRANCH}"

      - name: Cleanup Temporary Images
        if: ${{ always() && env.SKIP_EXECUTION != 'true' && env.IMAGE_COUNT != '' && env.IMAGE_COUNT != '0' }}
        run: |
          set -e

          echo "🧹 Cleaning up temporary image files..."

          # Remove temporary ticket assets directory
          TICKET_ASSETS_DIR="ticket-assets/${{ inputs.ticket_id }}"
          if [ -d "$TICKET_ASSETS_DIR" ]; then
            rm -rf "$TICKET_ASSETS_DIR"
            echo "  ✅ Removed temporary directory: $TICKET_ASSETS_DIR"
          fi

          echo "✅ Cleanup complete (images remain in Cloudinary)"

      - name: Update Job Status - Success
        if: ${{ success() && inputs.job_id && env.SKIP_EXECUTION != 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Skipped (E2E)
        if: ${{ success() && inputs.job_id && env.SKIP_EXECUTION == 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Failure
        if: ${{ failure() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to FAILED"

      - name: Update Job Status - Cancelled
        if: ${{ cancelled() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "CANCELLED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to CANCELLED"

      - name: Transition to VERIFY
        if: ${{ success() && env.SKIP_EXECUTION != 'true' }}
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          echo "🔄 Transitioning ticket to VERIFY stage..."
          echo "   This will trigger the verify workflow to run tests and create PR"
          .specify/scripts/bash/transition-to-verify.sh \
            "${TICKET_ID}" \
            "${PROJECT_ID}" \
            "${APP_URL}" \
            "${WORKFLOW_API_TOKEN}"

      - name: Report Success (Skipped)
        if: ${{ success() && env.SKIP_EXECUTION == 'true' }}
        run: |
          echo "✅ Quick-impl execution skipped because ticket title contains '[e2e]'"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Success
        if: ${{ success() && env.SKIP_EXECUTION != 'true' }}
        run: |
          echo "✅ Quick implementation completed successfully"
          echo "📍 Branch: ${FEATURE_BRANCH}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"
          echo "🔄 Ticket transitioned to VERIFY - tests will run next"

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Quick implementation failed"
          echo "📋 Check logs above for error details"
          echo "💡 Consider using full workflow (INBOX → SPECIFY → PLAN → BUILD) for complex features"
          exit 1
