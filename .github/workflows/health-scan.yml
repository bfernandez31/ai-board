name: Health Scan Workflow

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: 'HealthScan record ID'
        required: true
        type: string
      project_id:
        description: 'Project ID'
        required: true
        type: string
      scan_type:
        description: 'Scan type'
        required: true
        type: choice
        options:
          - SECURITY
          - COMPLIANCE
          - TESTS
          - SPEC_SYNC
      base_commit:
        description: 'Previous scan head commit (empty = full scan)'
        required: false
        type: string
        default: ''
      head_commit:
        description: 'Target commit (empty = use HEAD)'
        required: false
        type: string
        default: ''
      githubRepository:
        description: 'Target repo (owner/repo format)'
        required: true
        type: string
      agent:
        description: 'Agent CLI (CLAUDE or CODEX)'
        required: false
        type: string
        default: 'CLAUDE'

jobs:
  health-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      ANTHROPIC_MODEL: "claude-opus-4-6"
      CLAUDE_CODE_ENABLE_TELEMETRY: "1"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.APP_URL }}/api/telemetry
      OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Bearer ${{ secrets.WORKFLOW_API_TOKEN }}"
      OTEL_RESOURCE_ATTRIBUTES: "scan_id=${{ inputs.scan_id }}"
      OTEL_LOGS_EXPORT_INTERVAL: "60000"
      OTEL_BLRP_SCHEDULE_DELAY: "60000"

    steps:
      - name: Debug Inputs
        run: |
          echo "Health Scan Workflow"
          echo "  scan_id: ${{ inputs.scan_id }}"
          echo "  project_id: ${{ inputs.project_id }}"
          echo "  scan_type: ${{ inputs.scan_type }}"
          echo "  base_commit: ${{ inputs.base_commit }}"
          echo "  githubRepository: ${{ inputs.githubRepository }}"
          echo "  agent: ${{ inputs.agent }}"

      - name: Update Status - RUNNING
        run: |
          curl -X PATCH "${APP_URL}/api/projects/${{ inputs.project_id }}/health/scans/${{ inputs.scan_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "WARNING: Failed to update scan status to RUNNING"

      - name: Record Start Time
        id: timing
        run: echo "start_seconds=$SECONDS" >> "$GITHUB_OUTPUT"

      - name: Checkout ai-board (sparse - plugin + scripts only)
        uses: actions/checkout@v4
        with:
          path: ai-board
          sparse-checkout: |
            .claude-plugin
            .github/scripts
          sparse-checkout-cone-mode: true

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.githubRepository }}
          ref: main
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          path: target

      - name: Setup ai-board commands
        run: |
          mkdir -p target/.claude
          ln -sf ../../ai-board/.claude-plugin/commands target/.claude/commands
          ln -sf ../../ai-board/.claude-plugin/skills target/.claude/skills
          echo "ai-board commands linked to target/.claude/commands"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Configure Git
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Capture HEAD SHA
        id: head
        working-directory: target
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "HEAD commit: $HEAD_SHA"

      - name: Validate base_commit
        id: base
        working-directory: target
        run: |
          BASE_COMMIT="${{ inputs.base_commit }}"
          if [ -n "$BASE_COMMIT" ]; then
            if git cat-file -t "$BASE_COMMIT" >/dev/null 2>&1; then
              echo "commit=$BASE_COMMIT" >> "$GITHUB_OUTPUT"
              echo "base_commit validated: $BASE_COMMIT"
            else
              echo "commit=" >> "$GITHUB_OUTPUT"
              echo "WARNING: base_commit $BASE_COMMIT not found, falling back to full scan"
            fi
          else
            echo "commit=" >> "$GITHUB_OUTPUT"
            echo "No base_commit provided, performing full scan"
          fi

      - name: Map scan_type to command
        id: command
        run: |
          case "${{ inputs.scan_type }}" in
            SECURITY)    echo "name=health-security" >> "$GITHUB_OUTPUT" ;;
            COMPLIANCE)  echo "name=health-compliance" >> "$GITHUB_OUTPUT" ;;
            TESTS)       echo "name=health-tests" >> "$GITHUB_OUTPUT" ;;
            SPEC_SYNC)   echo "name=health-spec-sync" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "ERROR: Unknown scan_type: ${{ inputs.scan_type }}"
              exit 1
              ;;
          esac

      - name: Execute Scan Command
        id: scan
        working-directory: target
        run: |
          set +e

          COMMAND="${{ steps.command.outputs.name }}"
          ARGS="scan_id=${{ inputs.scan_id }} project_id=${{ inputs.project_id }} base_commit=${{ steps.base.outputs.commit }} head_commit=${{ steps.head.outputs.sha }}"

          echo "Executing: $COMMAND with args: $ARGS"

          ../ai-board/.github/scripts/run-agent.sh "${{ inputs.agent }}" "$COMMAND" "$ARGS" > /tmp/scan_report.txt 2>/tmp/scan_stderr.txt
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "scan_failed=true" >> "$GITHUB_OUTPUT"
            # Capture error message (truncate to 2000 chars)
            ERROR_MSG=$(cat /tmp/scan_stderr.txt | tail -c 2000)
            if [ -z "$ERROR_MSG" ]; then
              ERROR_MSG="Scan command failed with exit code $EXIT_CODE"
            fi
            # Write error to file to avoid escaping issues
            echo "$ERROR_MSG" > /tmp/scan_error.txt
            echo "Scan command failed (exit code $EXIT_CODE)"
          else
            echo "scan_failed=false" >> "$GITHUB_OUTPUT"
            echo "Scan command completed successfully"
          fi

      - name: Parse Report
        id: report
        if: steps.scan.outputs.scan_failed == 'false'
        run: |
          # Validate JSON output
          if ! jq empty /tmp/scan_report.txt 2>/dev/null; then
            echo "parse_failed=true" >> "$GITHUB_OUTPUT"
            echo "Invalid scan report format" > /tmp/scan_error.txt
            echo "ERROR: Scan output is not valid JSON"
            exit 0
          fi

          echo "parse_failed=false" >> "$GITHUB_OUTPUT"

          # Extract score and issue counts
          REPORT=$(cat /tmp/scan_report.txt)
          SCAN_TYPE="${{ inputs.scan_type }}"

          # Extract score (default 0 if not present)
          SCORE=$(echo "$REPORT" | jq -r '.score // 0')
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          # Count issues based on scan type
          case "$SCAN_TYPE" in
            SECURITY|COMPLIANCE)
              ISSUES_FOUND=$(echo "$REPORT" | jq '[.issues // [] | length] | add // 0')
              ISSUES_FIXED=0
              ;;
            TESTS)
              NON_FIXABLE=$(echo "$REPORT" | jq '[.nonFixable // [] | length] | add // 0')
              AUTO_FIXED=$(echo "$REPORT" | jq '[.autoFixed // [] | length] | add // 0')
              ISSUES_FOUND=$((NON_FIXABLE + AUTO_FIXED))
              ISSUES_FIXED=$AUTO_FIXED
              ;;
            SPEC_SYNC)
              ISSUES_FOUND=$(echo "$REPORT" | jq '[.specs // [] | map(select(.status == "drifted")) | length] | add // 0')
              ISSUES_FIXED=0
              ;;
          esac

          echo "issues_found=$ISSUES_FOUND" >> "$GITHUB_OUTPUT"
          echo "issues_fixed=$ISSUES_FIXED" >> "$GITHUB_OUTPUT"

          echo "Score: $SCORE, Issues Found: $ISSUES_FOUND, Issues Fixed: $ISSUES_FIXED"

      - name: Create Tickets for Issue Groups
        id: tickets
        if: steps.scan.outputs.scan_failed == 'false' && steps.report.outputs.parse_failed == 'false'
        run: |
          REPORT=$(cat /tmp/scan_report.txt)
          SCAN_TYPE="${{ inputs.scan_type }}"
          PROJECT_ID="${{ inputs.project_id }}"
          SCAN_ID="${{ inputs.scan_id }}"
          GENERATED_TICKETS="[]"

          create_ticket() {
            local title="$1"
            local description="$2"

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${APP_URL}/api/projects/${PROJECT_ID}/tickets" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
              -d "$(jq -n --arg t "$title" --arg d "$description" '{title: $t, description: $d}')")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "201" ]; then
              TICKET_KEY=$(echo "$BODY" | jq -r '.ticketKey // empty')
              if [ -n "$TICKET_KEY" ]; then
                GENERATED_TICKETS=$(echo "$GENERATED_TICKETS" | jq --arg k "$TICKET_KEY" '. + [{"ticketKey": $k, "stage": "INBOX"}]')
                echo "Created ticket: $TICKET_KEY"
              fi
            else
              echo "WARNING: Failed to create ticket (HTTP $HTTP_CODE): $title"
            fi
          }

          case "$SCAN_TYPE" in
            SECURITY)
              for severity in high medium low; do
                ISSUES=$(echo "$REPORT" | jq -r --arg s "$severity" '[.issues // [] | .[] | select(.severity == $s)]')
                COUNT=$(echo "$ISSUES" | jq 'length')
                if [ "$COUNT" -gt 0 ]; then
                  SEVERITY_UPPER=$(echo "$severity" | sed 's/./\U&/')
                  TITLE="[Health:Security] ${SEVERITY_UPPER} severity issues"

                  # Build description with issue details
                  DESCRIPTION="## Security Scan Issues (${SEVERITY_UPPER} Severity)\n\nScan ID: ${SCAN_ID}\n\n"
                  ISSUE_LIST=$(echo "$ISSUES" | jq -r '.[] | "- **\(.description // "Issue")** in `\(.file // "unknown"):\(.line // 0)`"')
                  DESCRIPTION="${DESCRIPTION}${ISSUE_LIST}\n\n*Auto-generated by health scan*"

                  create_ticket "$TITLE" "$(echo -e "$DESCRIPTION")"
                fi
              done
              ;;

            COMPLIANCE)
              # Group by category (constitution principle)
              CATEGORIES=$(echo "$REPORT" | jq -r '[.issues // [] | .[].category] | unique | .[]')
              for category in $CATEGORIES; do
                if [ -n "$category" ] && [ "$category" != "null" ]; then
                  ISSUES=$(echo "$REPORT" | jq -r --arg c "$category" '[.issues // [] | .[] | select(.category == $c)]')
                  COUNT=$(echo "$ISSUES" | jq 'length')
                  if [ "$COUNT" -gt 0 ]; then
                    TITLE="[Health:Compliance] ${category} violations"

                    DESCRIPTION="## Compliance Violations: ${category}\n\nScan ID: ${SCAN_ID}\n\n"
                    ISSUE_LIST=$(echo "$ISSUES" | jq -r '.[] | "- **\(.description // "Violation")** in `\(.file // "unknown"):\(.line // 0)`"')
                    DESCRIPTION="${DESCRIPTION}${ISSUE_LIST}\n\n*Auto-generated by health scan*"

                    create_ticket "$TITLE" "$(echo -e "$DESCRIPTION")"
                  fi
                fi
              done
              ;;

            TESTS)
              # One ticket per non-fixable test failure (skip autoFixed)
              NON_FIXABLE_COUNT=$(echo "$REPORT" | jq '[.nonFixable // [] | length] | add // 0')
              if [ "$NON_FIXABLE_COUNT" -gt 0 ]; then
                echo "$REPORT" | jq -c '.nonFixable // [] | .[]' | while read -r item; do
                  TEST_DESC=$(echo "$item" | jq -r '.description // "Test failure"')
                  TEST_FILE=$(echo "$item" | jq -r '.file // "unknown"')
                  TEST_LINE=$(echo "$item" | jq -r '.line // 0')

                  TITLE="[Health:Tests] ${TEST_DESC}"
                  # Truncate title to 100 chars
                  TITLE="${TITLE:0:100}"

                  DESCRIPTION="## Non-Fixable Test Failure\n\nScan ID: ${SCAN_ID}\n\n- **${TEST_DESC}** in \`${TEST_FILE}:${TEST_LINE}\`\n\n*Auto-generated by health scan*"

                  create_ticket "$TITLE" "$(echo -e "$DESCRIPTION")"
                done
              fi
              ;;

            SPEC_SYNC)
              # One ticket per drifted spec
              echo "$REPORT" | jq -c '.specs // [] | .[] | select(.status == "drifted")' | while read -r item; do
                SPEC_PATH=$(echo "$item" | jq -r '.specPath // "unknown"')
                DRIFT_DESC=$(echo "$item" | jq -r '.drift // "Specification has drifted from implementation"')

                TITLE="[Health:SpecSync] ${SPEC_PATH} drift"
                TITLE="${TITLE:0:100}"

                DESCRIPTION="## Specification Drift\n\nScan ID: ${SCAN_ID}\n\n- **${SPEC_PATH}**: ${DRIFT_DESC}\n\n*Auto-generated by health scan*"

                create_ticket "$TITLE" "$(echo -e "$DESCRIPTION")"
              done
              ;;
          esac

          # Save generated tickets for report update
          echo "$GENERATED_TICKETS" > /tmp/generated_tickets.json
          TICKET_COUNT=$(echo "$GENERATED_TICKETS" | jq 'length')
          echo "ticket_count=$TICKET_COUNT" >> "$GITHUB_OUTPUT"
          echo "Created $TICKET_COUNT tickets"

      - name: Update Report with Generated Tickets
        id: final_report
        if: steps.scan.outputs.scan_failed == 'false' && steps.report.outputs.parse_failed == 'false'
        run: |
          REPORT=$(cat /tmp/scan_report.txt)
          TICKETS=$(cat /tmp/generated_tickets.json 2>/dev/null || echo "[]")

          # Add generatedTickets to the report
          UPDATED_REPORT=$(echo "$REPORT" | jq --argjson tickets "$TICKETS" '. + {generatedTickets: $tickets}')
          echo "$UPDATED_REPORT" > /tmp/final_report.json

      - name: Calculate Telemetry
        id: telemetry
        run: |
          START=${{ steps.timing.outputs.start_seconds }}
          DURATION_MS=$(( (SECONDS - START) * 1000 ))
          echo "duration_ms=$DURATION_MS" >> "$GITHUB_OUTPUT"

          # Attempt to parse tokens/cost from agent output (best effort)
          TOKENS_USED=0
          COST_USD=0

          if [ -f /tmp/scan_report.txt ]; then
            # Try parsing Claude Code JSON output for token metrics
            TOKENS_USED=$(jq -r '.tokensUsed // 0' /tmp/scan_report.txt 2>/dev/null || echo "0")
            COST_USD=$(jq -r '.costUsd // 0' /tmp/scan_report.txt 2>/dev/null || echo "0")
          fi

          echo "tokens_used=$TOKENS_USED" >> "$GITHUB_OUTPUT"
          echo "cost_usd=$COST_USD" >> "$GITHUB_OUTPUT"
          echo "Duration: ${DURATION_MS}ms, Tokens: $TOKENS_USED, Cost: $COST_USD"

      - name: Update Status - COMPLETED
        if: steps.scan.outputs.scan_failed == 'false' && steps.report.outputs.parse_failed == 'false'
        run: |
          REPORT=$(cat /tmp/final_report.json)

          jq -n \
            --arg status "COMPLETED" \
            --argjson score "${{ steps.report.outputs.score }}" \
            --arg report "$REPORT" \
            --argjson issuesFound "${{ steps.report.outputs.issues_found }}" \
            --argjson issuesFixed "${{ steps.report.outputs.issues_fixed }}" \
            --arg headCommit "${{ steps.head.outputs.sha }}" \
            --argjson durationMs "${{ steps.telemetry.outputs.duration_ms }}" \
            --argjson tokensUsed "${{ steps.telemetry.outputs.tokens_used }}" \
            --argjson costUsd "${{ steps.telemetry.outputs.cost_usd }}" \
            '{
              status: $status,
              score: $score,
              report: $report,
              issuesFound: $issuesFound,
              issuesFixed: $issuesFixed,
              headCommit: $headCommit,
              durationMs: $durationMs,
              tokensUsed: $tokensUsed,
              costUsd: $costUsd
            }' > /tmp/completed_payload.json

          curl -X PATCH "${APP_URL}/api/projects/${{ inputs.project_id }}/health/scans/${{ inputs.scan_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d @/tmp/completed_payload.json \
            -f -s -S || echo "WARNING: Failed to update scan status to COMPLETED"

      - name: Update Status - FAILED (scan error)
        if: steps.scan.outputs.scan_failed == 'true'
        run: |
          ERROR_MSG=$(cat /tmp/scan_error.txt 2>/dev/null | head -c 2000 || echo "Scan command failed")
          DURATION_MS=${{ steps.telemetry.outputs.duration_ms }}

          jq -n \
            --arg status "FAILED" \
            --arg errorMessage "$ERROR_MSG" \
            --argjson durationMs "$DURATION_MS" \
            '{status: $status, errorMessage: $errorMessage, durationMs: $durationMs}' |
          curl -X PATCH "${APP_URL}/api/projects/${{ inputs.project_id }}/health/scans/${{ inputs.scan_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d @- \
            -f -s -S || echo "WARNING: Failed to update scan status to FAILED"

      - name: Update Status - FAILED (parse error)
        if: steps.scan.outputs.scan_failed == 'false' && steps.report.outputs.parse_failed == 'true'
        run: |
          ERROR_MSG=$(cat /tmp/scan_error.txt 2>/dev/null | head -c 2000 || echo "Invalid scan report format")
          DURATION_MS=${{ steps.telemetry.outputs.duration_ms }}

          jq -n \
            --arg status "FAILED" \
            --arg errorMessage "$ERROR_MSG" \
            --argjson durationMs "$DURATION_MS" \
            '{status: $status, errorMessage: $errorMessage, durationMs: $durationMs}' |
          curl -X PATCH "${APP_URL}/api/projects/${{ inputs.project_id }}/health/scans/${{ inputs.scan_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d @- \
            -f -s -S || echo "WARNING: Failed to update scan status to FAILED"

      - name: Update Status - FAILED (unexpected)
        if: failure()
        run: |
          DURATION_MS=$(( (SECONDS - ${{ steps.timing.outputs.start_seconds }}) * 1000 ))

          jq -n \
            --arg status "FAILED" \
            --arg errorMessage "Workflow failed unexpectedly" \
            --argjson durationMs "$DURATION_MS" \
            '{status: $status, errorMessage: $errorMessage, durationMs: $durationMs}' |
          curl -X PATCH "${APP_URL}/api/projects/${{ inputs.project_id }}/health/scans/${{ inputs.scan_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d @- \
            -s -S || echo "WARNING: Failed to update scan status to FAILED"

      - name: Report Success
        if: steps.scan.outputs.scan_failed == 'false' && steps.report.outputs.parse_failed == 'false'
        run: |
          echo "Health scan completed successfully"
          echo "  Scan ID: ${{ inputs.scan_id }}"
          echo "  Type: ${{ inputs.scan_type }}"
          echo "  Score: ${{ steps.report.outputs.score }}"
          echo "  Issues Found: ${{ steps.report.outputs.issues_found }}"
          echo "  Issues Fixed: ${{ steps.report.outputs.issues_fixed }}"
          echo "  Tickets Created: ${{ steps.tickets.outputs.ticket_count }}"
          echo "  Duration: ${{ steps.telemetry.outputs.duration_ms }}ms"
