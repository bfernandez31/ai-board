name: AI-BOARD Assist Workflow
# Triggered when users mention @ai-board in ticket comments

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID'
        required: true
        type: string

      stage:
        description: 'Current ticket stage (specify, plan, build, verify)'
        required: true
        type: string

      branch:
        description: 'Git branch name for this ticket'
        required: true
        type: string

      user_id:
        description: 'User ID who mentioned AI-BOARD (for notification mention)'
        required: true
        type: string

      user:
        description: 'Username who mentioned AI-BOARD (for display)'
        required: true
        type: string

      comment:
        description: 'Comment content with user request'
        required: true
        type: string

      job_id:
        description: 'Job ID for status tracking'
        required: true
        type: string

      project_id:
        description: 'Project ID'
        required: true
        type: string

      githubRepository:
        description: 'GitHub repository in format owner/repo (e.g., bfernandez31/ai-board)'
        required: true
        type: string

jobs:
  ai-board-assist:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SKIP_CLAUDE: ${{ contains(inputs.ticket_id, '[e2e]') || inputs.stage == 'build' }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      # Use Opus model for Claude Code
      ANTHROPIC_MODEL: "claude-opus-4-5-20251101"
      # Claude Code telemetry - send to OTLP endpoint
      CLAUDE_CODE_ENABLE_TELEMETRY: "1"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.APP_URL }}/api/telemetry
      OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Bearer ${{ secrets.WORKFLOW_API_TOKEN }}"
      OTEL_RESOURCE_ATTRIBUTES: "job_id=${{ inputs.job_id }}"

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Debug workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  stage: ${{ inputs.stage }}"
          echo "  user_id: ${{ inputs.user_id }}"
          echo "  user: ${{ inputs.user }}"
          echo "  githubRepository: ${{ inputs.githubRepository }}"
          echo "  SKIP_CLAUDE: ${{ env.SKIP_CLAUDE }}"

      - name: Update Job Status - Running
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Handle Skip Scenarios
        if: ${{ env.SKIP_CLAUDE == 'true' }}
        run: |
          echo "ℹ️ Skipping Claude execution"

          # Determine skip message
          if [[ "${{ inputs.ticket_id }}" == *"[e2e]"* ]]; then
            MESSAGE="AI-BOARD analysis skipped for test ticket [e2e]"
            echo "📝 Skip reason: E2E test ticket"
          else
            MESSAGE="@${{ inputs.user }} This feature is not yet implemented for ${{ inputs.stage }} stage."
            echo "📝 Skip reason: BUILD stage not implemented"
          fi

          # Post skip message as AI-BOARD comment
          curl -L -X POST "${APP_URL}/api/projects/${{ inputs.project_id }}/tickets/${{ inputs.ticket_id }}/comments/ai-board" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"content\": \"${MESSAGE}\", \"userId\": \"ai-board-system-user\"}" \
            -f -s -S || echo "⚠️ Failed to post skip message"

          # Update job status to COMPLETED (skipped workflows are still "successful")
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

          # Exit successfully (skip is not a failure)
          exit 0

      - name: Checkout repository
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        uses: actions/checkout@v4
        with:
          # Checkout external project repository (format: owner/repo)
          repository: ${{ inputs.githubRepository }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Install Claude CLI
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Setup Test Environment
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "🔧 Setting up test environment..."
          .github/scripts/setup-test-env.sh

      - name: Fetch Telemetry for Compare
        if: ${{ env.SKIP_CLAUDE != 'true' && contains(inputs.comment, '/compare') }}
        env:
          BRANCH: ${{ inputs.branch }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          echo "📊 Fetching telemetry for /compare command..."
          .github/scripts/fetch-telemetry.sh "${{ inputs.comment }}"

      - name: Execute AI-BOARD Command
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        id: claude
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          STAGE: ${{ inputs.stage }}
          BRANCH: ${{ inputs.branch }}
          USER_ID: ${{ inputs.user_id }}
          USER: ${{ inputs.user }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          echo "🤖 Executing AI-BOARD assist command..."

          echo "📦 Request details:"
          echo "  Ticket: #$TICKET_ID"
          echo "  Stage: $STAGE"
          echo "  Branch: $BRANCH"
          echo "  User: @$USER"
          echo "  Comment: ${{ inputs.comment }}"

          # Debug: Show current directory and branch
          echo "📂 Current directory: $(pwd)"
          echo "🌿 Current branch: $(git branch --show-current)"

          # Debug: Check if spec files exist
          if [ -d "specs/${{ inputs.branch }}" ]; then
            echo "✅ Spec directory exists: specs/${{ inputs.branch }}"
            ls -la "specs/${{ inputs.branch }}/" || true
          else
            echo "⚠️ Spec directory not found: specs/${{ inputs.branch }}"
          fi

          # For /compare commands, clean up old result file to force fresh analysis
          if echo "${{ inputs.comment }}" | grep -q "/compare"; then
            echo "🧹 Cleaning up old result file for /compare command..."
            rm -f "specs/${{ inputs.branch }}/.ai-board-result.md" || true
          fi

          # Detect skill command in comment and route appropriately
          echo "🚀 Executing Claude command..."
          COMMENT="${{ inputs.comment }}"

          # Route /compare command to dedicated skill (designed for comment usage)
          # Note: /verify and /iterate-verify are launched by their own workflows, not via comments
          if echo "$COMMENT" | grep -qE "/compare\b"; then
            echo "📌 Detected /compare command - routing to compare skill"
            # Extract arguments after /compare (e.g., "#AIB-133 #AIB-134")
            ARGS=$(echo "$COMMENT" | sed -n 's/.*\/compare[[:space:]]*\(.*\)/\1/p')
            OUTPUT=$(claude --dangerously-skip-permissions "/compare \"$ARGS\"" || true)
          elif echo "$COMMENT" | grep -qE "/review\b"; then
            echo "📌 Detected /review command - routing to review skill"
            # Extract arguments after /review (e.g., PR number if provided)
            ARGS=$(echo "$COMMENT" | sed -n 's/.*\/review[[:space:]]*\(.*\)/\1/p')
            OUTPUT=$(claude --dangerously-skip-permissions "/review \"$ARGS\"" || true)
          else
            echo "📌 Using ai-board-assist for general request"
            OUTPUT=$(claude --dangerously-skip-permissions "/ai-board-assist \"$COMMENT\"" || true)
          fi

          # Clean Claude's output - remove any JSON blocks that might break GitHub Actions
          # Remove ```json ... ``` blocks as they cause "Invalid format" errors
          CLAUDE_MESSAGE=$(echo "$OUTPUT" | sed '/^```json$/,/^```$/d' | sed 's/```//g')

          # Also save raw output for debugging
          echo "📝 Raw Claude output (first 50 lines):"
          echo "$OUTPUT" | head -n 50

          # Check if result file was created for status determination
          RESULT_FILE="specs/${{ inputs.branch }}/.ai-board-result.md"
          if [ -f "$RESULT_FILE" ]; then
            echo "✅ Result file found: $RESULT_FILE"

            # Extract status from result file
            STATUS=$(grep -A 1 "^## Status" "$RESULT_FILE" | tail -1 | tr -d ' ')

            # Extract files modified for tracking
            FILES_SECTION=$(sed -n '/^## Files Modified/,/^##/p' "$RESULT_FILE" | grep "^- " | sed 's/^- //' | tr '\n' ',' | sed 's/,$//')

            # Extract issues to fix if ITERATE_REQUIRED
            if [ "$STATUS" = "ITERATE_REQUIRED" ]; then
              ISSUES_SECTION=$(sed -n '/^## Issues To Fix/,/^##/p' "$RESULT_FILE" | grep "^- " | sed 's/^- //')
            fi

            # Create JSON output based on status
            if [ "$STATUS" = "SUCCESS" ]; then
              JSON_OUTPUT=$(jq -n \
                --arg status "success" \
                --arg message "$CLAUDE_MESSAGE" \
                --arg files "$FILES_SECTION" \
                '{"status": $status, "message": $message, "filesModified": ($files | split(","))}'
              )
            elif [ "$STATUS" = "ITERATE_REQUIRED" ]; then
              JSON_OUTPUT=$(jq -n \
                --arg status "iterate_required" \
                --arg message "$CLAUDE_MESSAGE" \
                --arg issues "$ISSUES_SECTION" \
                '{"status": $status, "message": $message, "issuesToFix": ($issues | split("\n") | map(select(. != ""))), "filesModified": []}'
              )
            elif [ "$STATUS" = "NOT_IMPLEMENTED" ]; then
              JSON_OUTPUT=$(jq -n \
                --arg status "not_implemented" \
                --arg message "$CLAUDE_MESSAGE" \
                '{"status": $status, "message": $message, "filesModified": []}'
              )
            else
              JSON_OUTPUT=$(jq -n \
                --arg status "error" \
                --arg message "$CLAUDE_MESSAGE" \
                '{"status": $status, "message": $message, "filesModified": []}'
              )
            fi
          else
            echo "⚠️ Result file not found, checking for changes..."

            # Fallback: try to detect if changes were made
            if git diff --quiet; then
              echo "ℹ️ No changes detected in repository"
              # If no changes and no result file, consider it an error
              JSON_OUTPUT=$(jq -n \
                --arg status "error" \
                --arg message "$CLAUDE_MESSAGE" \
                '{"status": $status, "message": $message, "filesModified": []}'
              )
            else
              echo "✅ Changes detected, assuming success"
              # Get list of modified files
              MODIFIED_FILES=$(git diff --name-only | grep "^specs/" | xargs -I {} basename {} | tr '\n' ',' | sed 's/,$//')
              JSON_OUTPUT=$(jq -n \
                --arg status "success" \
                --arg message "$CLAUDE_MESSAGE" \
                --arg files "$MODIFIED_FILES" \
                '{"status": $status, "message": $message, "filesModified": ($files | split(",") | map(select(. != "")))}'
              )
            fi
          fi

          echo "json_output<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse Claude Response
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        id: parse
        env:
          JSON_OUTPUT: ${{ steps.claude.outputs.json_output }}
        run: |
          # Use env var instead of direct substitution to avoid shell escaping issues
          STATUS=$(echo "$JSON_OUTPUT" | jq -r '.status')
          MESSAGE=$(echo "$JSON_OUTPUT" | jq -r '.message')
          FILES=$(echo "$JSON_OUTPUT" | jq -r '.filesModified | join(",")')

          # Set outputs in a safer way - status and files first (single line)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

          # Then the multiline message last
          echo "message<<GITHUB_MESSAGE_DELIMITER" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "GITHUB_MESSAGE_DELIMITER" >> $GITHUB_OUTPUT

          echo "📊 Claude Response:"
          echo "  Status: $STATUS"
          echo "  Files: $FILES"

          # Debug: Verify outputs are set
          echo "🔍 Debug - Status output: $STATUS"
          echo "🔍 Debug - Files output: $FILES"

      - name: Commit and Push Changes
        if: ${{ env.SKIP_CLAUDE != 'true' && steps.parse.outputs.status == 'success' }}
        run: |
          echo "💾 Committing modified files..."

          # Add modified files from the ticket's branch directory
          git add specs/${{ inputs.branch }}/ || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit (Claude may have already committed)"
          else
            # Use files list if available, otherwise detect changed files
            if [ -n "${{ steps.parse.outputs.files }}" ]; then
              MODIFIED_FILES="${{ steps.parse.outputs.files }}"
            else
              MODIFIED_FILES=$(git diff --staged --name-only | grep "^specs/" | xargs -I {} basename {} | tr '\n' ', ' | sed 's/,$//' || echo "spec artifacts")
            fi

            COMMIT_MSG="AI-BOARD: Update ticket artifacts per user request

          Ticket: ${{ inputs.ticket_id }}
          Stage: ${{ inputs.stage }}
          Requester: @${{ inputs.user }}
          Modified: ${MODIFIED_FILES}

          Generated by AI-BOARD Assistant workflow"

            git commit -m "$COMMIT_MSG"
            echo "✅ Changes committed"
          fi

          # Always push (Claude may have committed during command execution)
          git push origin ${{ inputs.branch }}
          echo "✅ Changes pushed to branch: ${{ inputs.branch }}"

      - name: Post AI-BOARD Response Comment
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        env:
          MESSAGE: ${{ steps.parse.outputs.message }}
          USER_ID: ${{ inputs.user_id }}
          USER_NAME: ${{ inputs.user }}
        run: |
          echo "💬 Posting AI-BOARD response comment..."
          echo "📝 Raw message (first 300 chars): ${MESSAGE:0:300}..."

          # Clean Claude's output:
          # 1. Remove preamble (everything before the first @ mention or MENTION_)
          # 2. Replace ANY MENTION_xxx_yyy pattern with proper @[userId:displayName] format
          CLEANED_MESSAGE="$MESSAGE"

          # Remove preamble: keep only from first @[ or MENTION_ onwards
          if echo "$CLEANED_MESSAGE" | grep -q '@\['; then
            # Extract from first @[ to end, removing any text before it on that line
            CLEANED_MESSAGE=$(echo "$CLEANED_MESSAGE" | sed -n '/@\[/,$p' | sed '1s/.*\(@\[.*\)/\1/')
          elif echo "$CLEANED_MESSAGE" | grep -q 'MENTION_'; then
            # Extract from first MENTION_ to end, removing any text before it on that line
            CLEANED_MESSAGE=$(echo "$CLEANED_MESSAGE" | sed -n '/MENTION_/,$p' | sed '1s/.*\(MENTION_.*\)/\1/')
          fi

          # Replace ANY MENTION_xxx_yyy pattern with @[userId:displayName]
          # Pattern: MENTION_ followed by any characters until _ followed by digits
          # This catches MENTION_81817281_121, MENTION_cm47j3m31817281_456, etc.
          CLEANED_MESSAGE=$(echo "$CLEANED_MESSAGE" | sed "s/MENTION_[^_]*_[0-9]*/@[${USER_ID}:${USER_NAME}]/g")

          # Also replace ANY @[wrongId:displayName] with correct @[USER_ID:displayName]
          # Claude sometimes outputs @[randomId:name] instead of using the actual USER_ID
          # This catches the case where Claude uses its own internal ID (like 81817281 instead of cm47j3m31817281)
          CLEANED_MESSAGE=$(echo "$CLEANED_MESSAGE" | sed "s/@\[[^:]*:${USER_NAME}\]/@[${USER_ID}:${USER_NAME}]/g")

          echo "📝 Cleaned message (first 300 chars): ${CLEANED_MESSAGE:0:300}..."

          # Escape special characters for JSON
          MESSAGE_JSON=$(echo "$CLEANED_MESSAGE" | jq -Rs .)

          curl -L -X POST "${APP_URL}/api/projects/${{ inputs.project_id }}/tickets/${{ inputs.ticket_id }}/comments/ai-board" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"content\": ${MESSAGE_JSON}, \"userId\": \"ai-board-system-user\"}" \
            -f -s -S || echo "⚠️ Failed to post AI-BOARD comment"

      - name: Dispatch Iterate Workflow if Required
        if: ${{ env.SKIP_CLAUDE != 'true' && steps.parse.outputs.status == 'iterate_required' }}
        id: iterate
        env:
          RESULT_FILE: specs/${{ inputs.branch }}/.ai-board-result.md
        run: |
          echo "🔄 Preparing to dispatch iterate.yml workflow..."

          # Extract issues to fix from result file
          ISSUES_JSON="[]"
          if [ -f "$RESULT_FILE" ]; then
            ISSUES=$(sed -n '/^## Issues To Fix/,/^##/p' "$RESULT_FILE" | grep "^- " | sed 's/^- //' | jq -Rs 'split("\n") | map(select(. != ""))')
            ISSUES_JSON="$ISSUES"
          fi

          # Create iterate job via API
          # Remove trailing slash from APP_URL if present
          API_BASE="${APP_URL%/}"
          JOBS_URL="${API_BASE}/api/projects/${{ inputs.project_id }}/jobs"
          echo "📝 Creating iterate job..."
          echo "🔗 URL: $JOBS_URL"
          HTTP_RESPONSE=$(curl -X POST "$JOBS_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{
              \"ticketId\": ${{ inputs.ticket_id }},
              \"command\": \"iterate\",
              \"branch\": \"${{ inputs.branch }}\"
            }" \
            -s -w "\n%{http_code}")

          # Extract HTTP status code (last line) and response body (everything else)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -1)
          JOB_RESPONSE=$(echo "$HTTP_RESPONSE" | sed '$d')

          echo "📊 HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            JOB_ID=$(echo "$JOB_RESPONSE" | jq -r '.id')
            if [ "$JOB_ID" = "null" ] || [ -z "$JOB_ID" ]; then
              echo "❌ Failed to extract job ID from response"
              echo "📋 Response: $JOB_RESPONSE"
              exit 1
            fi
            echo "✅ Created iterate job: $JOB_ID"
          else
            echo "❌ Failed to create iterate job. HTTP $HTTP_STATUS"
            echo "📋 Response: $JOB_RESPONSE"
            exit 1
          fi

          # Dispatch iterate workflow
          # Note: GITHUB_TOKEN cannot trigger workflow_dispatch, must use GH_PAT
          echo "🚀 Dispatching iterate.yml workflow..."
          DISPATCH_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/iterate.yml/dispatches" \
            -d "{
              \"ref\": \"main\",
              \"inputs\": {
                \"ticket_id\": \"${{ inputs.ticket_id }}\",
                \"job_id\": \"$JOB_ID\",
                \"project_id\": \"${{ inputs.project_id }}\",
                \"branch\": \"${{ inputs.branch }}\",
                \"issues_to_fix\": $(echo "$ISSUES_JSON" | jq -c 'tojson'),
                \"githubRepository\": \"${{ inputs.githubRepository }}\"
              }
            }")

          DISPATCH_STATUS=$(echo "$DISPATCH_RESPONSE" | tail -1)
          DISPATCH_BODY=$(echo "$DISPATCH_RESPONSE" | sed '$d')

          if [ "$DISPATCH_STATUS" = "204" ]; then
            echo "✅ Iterate workflow dispatched successfully"
          else
            echo "❌ Failed to dispatch iterate workflow. HTTP $DISPATCH_STATUS"
            echo "📋 Response: $DISPATCH_BODY"
            exit 1
          fi

      - name: Debug Status Check
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        run: |
          echo "🔍 Debug Job Status Update"
          echo "  Parse status output: '${{ steps.parse.outputs.status }}'"
          echo "  Is success?: ${{ steps.parse.outputs.status == 'success' }}"
          echo "  Is iterate_required?: ${{ steps.parse.outputs.status == 'iterate_required' }}"
          echo "  Files output: '${{ steps.parse.outputs.files }}'"

      - name: Update Job Status - Success
        if: ${{ env.SKIP_CLAUDE != 'true' && (steps.parse.outputs.status == 'success' || steps.parse.outputs.status == 'iterate_required') }}
        run: |
          echo "✅ Updating job status to COMPLETED"
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

      - name: Update Job Status - Failure
        if: ${{ failure() || (env.SKIP_CLAUDE != 'true' && steps.parse.outputs.status != 'success' && steps.parse.outputs.status != 'iterate_required') }}
        run: |
          echo "❌ Updating job status to FAILED (status was: '${{ steps.parse.outputs.status }}')"
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"
