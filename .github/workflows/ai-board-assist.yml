name: AI-BOARD Assist Workflow
# Triggered when users mention @ai-board in ticket comments

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID'
        required: true
        type: string

      ticketTitle:
        description: 'Ticket title'
        required: true
        type: string

      stage:
        description: 'Current ticket stage (specify, plan, build, verify)'
        required: true
        type: string

      branch:
        description: 'Git branch name for this ticket'
        required: true
        type: string

      user:
        description: 'Username who mentioned AI-BOARD (for response)'
        required: true
        type: string

      comment:
        description: 'Comment content with user request'
        required: true
        type: string

      job_id:
        description: 'Job ID for status tracking'
        required: true
        type: string

      project_id:
        description: 'Project ID'
        required: true
        type: string

jobs:
  ai-board-assist:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SKIP_CLAUDE: ${{ contains(inputs.ticketTitle, '[e2e]') || inputs.stage == 'build' || inputs.stage == 'verify' }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Debug workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  stage: ${{ inputs.stage }}"
          echo "  user: ${{ inputs.user }}"
          echo "  ticketTitle: ${{ inputs.ticketTitle }}"
          echo "  SKIP_CLAUDE: ${{ env.SKIP_CLAUDE }}"

      - name: Update Job Status - Running
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Handle Skip Scenarios
        if: ${{ env.SKIP_CLAUDE == 'true' }}
        run: |
          echo "ℹ️ Skipping Claude execution"

          # Determine skip message
          if [[ "${{ inputs.ticketTitle }}" == *"[e2e]"* ]]; then
            MESSAGE="AI-BOARD analysis skipped for test ticket [e2e]"
            echo "📝 Skip reason: E2E test ticket"
          else
            MESSAGE="@${{ inputs.user }} This feature is not yet implemented for ${{ inputs.stage }} stage."
            echo "📝 Skip reason: BUILD/VERIFY stage not implemented"
          fi

          # Post skip message as AI-BOARD comment
          curl -L -X POST "${APP_URL}/api/projects/${{ inputs.project_id }}/tickets/${{ inputs.ticket_id }}/comments/ai-board" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"content\": \"${MESSAGE}\", \"userId\": \"ai-board-system-user\"}" \
            -f -s -S || echo "⚠️ Failed to post skip message"

          # Update job status to COMPLETED (skipped workflows are still "successful")
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

          # Exit successfully (skip is not a failure)
          exit 0

      - name: Checkout repository
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Install Claude CLI
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Setup Test Environment
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "🔧 Setting up test environment..."
          .github/scripts/setup-test-env.sh

      - name: Execute AI-BOARD Command
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        id: claude
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          TICKET_TITLE: ${{ inputs.ticketTitle }}
          STAGE: ${{ inputs.stage }}
          BRANCH: ${{ inputs.branch }}
          USER: ${{ inputs.user }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          echo "🤖 Executing AI-BOARD assist command..."

          echo "📦 Request details:"
          echo "  Ticket: #$TICKET_ID - $TICKET_TITLE"
          echo "  Stage: $STAGE"
          echo "  Branch: $BRANCH"
          echo "  User: @$USER"
          echo "  Comment: ${{ inputs.comment }}"

          # Debug: Show current directory and branch
          echo "📂 Current directory: $(pwd)"
          echo "🌿 Current branch: $(git branch --show-current)"

          # Debug: Check if spec files exist
          if [ -d "specs/${{ inputs.branch }}" ]; then
            echo "✅ Spec directory exists: specs/${{ inputs.branch }}"
            ls -la "specs/${{ inputs.branch }}/" || true
          else
            echo "⚠️ Spec directory not found: specs/${{ inputs.branch }}"
          fi

          # Execute Claude CLI command with comment as plain text argument
          echo "🚀 Executing Claude command..."
          OUTPUT=$(claude --dangerously-skip-permissions "/ai-board-assist \"${{ inputs.comment }}\"" 2>&1 || true)

          # Clean Claude's output - remove any JSON blocks that might break GitHub Actions
          # Remove ```json ... ``` blocks as they cause "Invalid format" errors
          CLAUDE_MESSAGE=$(echo "$OUTPUT" | sed '/^```json$/,/^```$/d' | sed 's/```//g')

          # Also save raw output for debugging
          echo "📝 Raw Claude output (first 50 lines):"
          echo "$OUTPUT" | head -n 50

          # Check if result file was created for status determination
          RESULT_FILE="specs/${{ inputs.branch }}/.ai-board-result.md"
          if [ -f "$RESULT_FILE" ]; then
            echo "✅ Result file found: $RESULT_FILE"

            # Extract status from result file
            STATUS=$(grep -A 1 "^## Status" "$RESULT_FILE" | tail -1 | tr -d ' ')

            # Extract files modified for tracking
            FILES_SECTION=$(sed -n '/^## Files Modified/,/^##/p' "$RESULT_FILE" | grep "^- " | sed 's/^- //' | tr '\n' ',' | sed 's/,$//')

            # Create JSON output based on status
            if [ "$STATUS" = "SUCCESS" ]; then
              JSON_OUTPUT=$(jq -n \
                --arg status "success" \
                --arg message "$CLAUDE_MESSAGE" \
                --arg files "$FILES_SECTION" \
                '{"status": $status, "message": $message, "filesModified": ($files | split(","))}'
              )
            elif [ "$STATUS" = "NOT_IMPLEMENTED" ]; then
              JSON_OUTPUT=$(jq -n \
                --arg status "not_implemented" \
                --arg message "$CLAUDE_MESSAGE" \
                '{"status": $status, "message": $message, "filesModified": []}'
              )
            else
              JSON_OUTPUT=$(jq -n \
                --arg status "error" \
                --arg message "$CLAUDE_MESSAGE" \
                '{"status": $status, "message": $message, "filesModified": []}'
              )
            fi
          else
            echo "⚠️ Result file not found, checking for changes..."

            # Fallback: try to detect if changes were made
            if git diff --quiet; then
              echo "ℹ️ No changes detected in repository"
              # If no changes and no result file, consider it an error
              JSON_OUTPUT=$(jq -n \
                --arg status "error" \
                --arg message "$CLAUDE_MESSAGE" \
                '{"status": $status, "message": $message, "filesModified": []}'
              )
            else
              echo "✅ Changes detected, assuming success"
              # Get list of modified files
              MODIFIED_FILES=$(git diff --name-only | grep "^specs/" | xargs -I {} basename {} | tr '\n' ',' | sed 's/,$//')
              JSON_OUTPUT=$(jq -n \
                --arg status "success" \
                --arg message "$CLAUDE_MESSAGE" \
                --arg files "$MODIFIED_FILES" \
                '{"status": $status, "message": $message, "filesModified": ($files | split(",") | map(select(. != "")))}'
              )
            fi
          fi

          echo "json_output<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse Claude Response
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        id: parse
        env:
          JSON_OUTPUT: ${{ steps.claude.outputs.json_output }}
        run: |
          # Use env var instead of direct substitution to avoid shell escaping issues
          STATUS=$(echo "$JSON_OUTPUT" | jq -r '.status')
          MESSAGE=$(echo "$JSON_OUTPUT" | jq -r '.message')
          FILES=$(echo "$JSON_OUTPUT" | jq -r '.filesModified | join(",")')

          # Set outputs in a safer way - status and files first (single line)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT

          # Then the multiline message last
          echo "message<<GITHUB_MESSAGE_DELIMITER" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "GITHUB_MESSAGE_DELIMITER" >> $GITHUB_OUTPUT

          echo "📊 Claude Response:"
          echo "  Status: $STATUS"
          echo "  Files: $FILES"

          # Debug: Verify outputs are set
          echo "🔍 Debug - Status output: $STATUS"
          echo "🔍 Debug - Files output: $FILES"

      - name: Commit and Push Changes
        if: ${{ env.SKIP_CLAUDE != 'true' && steps.parse.outputs.status == 'success' && steps.parse.outputs.files != '' }}
        run: |
          echo "💾 Committing modified files..."

          # Add modified files from the ticket's branch directory
          git add specs/${{ inputs.branch }}/ || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit (Claude may have already committed)"
          else
            COMMIT_MSG="AI-BOARD: Update ticket artifacts per user request

          Ticket: ${{ inputs.ticket_id }}
          Stage: ${{ inputs.stage }}
          Requester: @${{ inputs.user }}
          Modified: ${{ steps.parse.outputs.files }}

          Generated by AI-BOARD Assistant workflow"

            git commit -m "$COMMIT_MSG"
            echo "✅ Changes committed"
          fi

          # Always push (Claude may have committed during command execution)
          git push origin ${{ inputs.branch }}
          echo "✅ Changes pushed to branch: ${{ inputs.branch }}"

      - name: Post AI-BOARD Response Comment
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        env:
          MESSAGE: ${{ steps.parse.outputs.message }}
        run: |
          echo "💬 Posting AI-BOARD response comment..."

          # Use env var to avoid shell escaping issues with special characters
          # Escape special characters for JSON
          MESSAGE_JSON=$(echo "$MESSAGE" | jq -Rs .)

          curl -L -X POST "${APP_URL}/api/projects/${{ inputs.project_id }}/tickets/${{ inputs.ticket_id }}/comments/ai-board" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"content\": ${MESSAGE_JSON}, \"userId\": \"ai-board-system-user\"}" \
            -f -s -S || echo "⚠️ Failed to post AI-BOARD comment"

      - name: Debug Status Check
        if: ${{ env.SKIP_CLAUDE != 'true' }}
        run: |
          echo "🔍 Debug Job Status Update"
          echo "  Parse status output: '${{ steps.parse.outputs.status }}'"
          echo "  Is success?: ${{ steps.parse.outputs.status == 'success' }}"
          echo "  Files output: '${{ steps.parse.outputs.files }}'"

      - name: Update Job Status - Success
        if: ${{ env.SKIP_CLAUDE != 'true' && steps.parse.outputs.status == 'success' }}
        run: |
          echo "✅ Updating job status to COMPLETED"
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

      - name: Update Job Status - Failure
        if: ${{ env.SKIP_CLAUDE != 'true' && steps.parse.outputs.status != 'success' }}
        run: |
          echo "❌ Updating job status to FAILED (status was: '${{ steps.parse.outputs.status }}')"
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"
