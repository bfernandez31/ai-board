name: Deploy Preview

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID to deploy'
        required: true
        type: string
      project_id:
        description: 'Project ID for authorization'
        required: true
        type: string
      branch:
        description: 'Git branch to deploy'
        required: true
        type: string
      job_id:
        description: 'Job ID to update status'
        required: true
        type: string

env:
  APP_URL: ${{ vars.APP_URL }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel Preview (Manual)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --- Update job to RUNNING ---
      - name: Update job status → RUNNING
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "RUNNING"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status

      # --- Checkout the branch to deploy ---
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      # --- Install Vercel CLI ---
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # --- Deploy manually using CLI ---
      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          echo "🚀 Deploying branch '${{ inputs.branch }}' to Vercel Preview..."

          # Deploy and capture the output
          DEPLOY_OUTPUT=$(vercel deploy \
            --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            2>&1 | tee /tmp/deploy.log)

          # Extract the preview URL (last line starting with https://)
          DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-z0-9-]+\.vercel\.app' | tail -1)

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "❌ Failed to extract deployment URL from Vercel output"
            echo "Full output:"
            cat /tmp/deploy.log
            exit 1
          fi

          echo "✅ Deployment initiated: $DEPLOYMENT_URL"
          echo "⏳ Waiting for build to complete..."

          # Wait for the deployment to be ready (max 10 minutes)
          TIMEOUT=600
          ELAPSED=0
          INTERVAL=10

          while [ $ELAPSED -lt $TIMEOUT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOYMENT_URL")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deployment is ready and accessible!"
              echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "⏳ Build in progress... (HTTP $HTTP_CODE) - ${ELAPSED}s elapsed"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Deployment timed out after ${TIMEOUT}s"
          exit 1

      # --- Update ticket with preview URL ---
      - name: Update ticket preview URL
        if: success()
        run: |
          echo "🔗 Updating ticket preview URL..."
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d "{\"previewUrl\": \"${{ steps.deploy.outputs.url }}\"}" \
            ${{ env.APP_URL }}/api/projects/${{ inputs.project_id }}/tickets/${{ inputs.ticket_id }}/preview-url

      # --- Update job status to COMPLETED ---
      - name: Update job status → COMPLETED
        if: success()
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "COMPLETED"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status

      # --- Update job status to FAILED ---
      - name: Update job status → FAILED
        if: failure()
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "FAILED"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status
