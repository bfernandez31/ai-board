name: Spec-Kit Workflow Execution
# Manual trigger workflow for spec-kit command execution

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket identifier (e.g., 016, PROJ-123)'
        required: true
        type: string

      ticketTitle:
        description: 'Ticket title for context (required for specify command)'
        required: false
        type: string

      ticketDescription:
        description: 'Detailed ticket description (required for specify command)'
        required: false
        type: string

      attachments:
        description: 'JSON array of ticket attachments (images for Claude context)'
        required: false
        type: string
        default: '[]'

      specifyPayload:
        description: 'JSON payload with featureDescription and clarificationPolicy (overrides ticketTitle/ticketDescription)'
        required: false
        type: string
        default: ''

      branch:
        description: 'Target branch (optional for specify, required for others)'
        required: false
        type: string
        default: ''

      command:
        description: 'Spec-kit command to execute'
        required: true
        type: choice
        options:
          - specify
          - plan
          - task
          - implement
          - clarify

      answers_json:
        description: 'JSON answers for clarify command (optional)'
        required: false
        type: string
        default: '{}'

      job_id:
        description: 'Job ID for status tracking (optional)'
        required: false
        type: string
        default: ''

jobs:
  run-speckit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SKIP_SPECKIT_EXECUTION: ${{ contains(inputs.ticketTitle, '[e2e]') }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Debug workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  command: ${{ inputs.command }}"
          echo "  ticketTitle: ${{ inputs.ticketTitle }}"

      - name: Report E2E Skip
        if: ${{ env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ '[e2e]' detected in ticket title; skipping Spec-Kit execution to preserve resources"

      - name: Update Job Status - Running
        if: ${{ inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Checkout repository
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/checkout@v4
        with:
          # For specify command, always checkout main (branch will be created later)
          # For other commands, checkout the provided branch
          ref: ${{ inputs.command == 'specify' && 'main' || inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup Python
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Prepare Images for Claude (Specify Command)
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && inputs.attachments != '[]' }}
        run: |
          set -e

          echo "📸 Preparing images for Claude context..."
          echo "ℹ️  Images are stored in Cloudinary, not in the Git repository"

          # Create ticket assets directory (temporary, for Claude context only)
          TICKET_ASSETS_DIR="ticket-assets/${{ inputs.ticket_id }}"
          mkdir -p "$TICKET_ASSETS_DIR"

          # Parse attachments JSON
          echo '${{ inputs.attachments }}' > /tmp/attachments.json

          # Download external images and collect all image paths
          IMAGE_COUNT=0
          IMAGE_PATHS=""

          # Process each attachment
          for row in $(jq -r '.[] | @base64' /tmp/attachments.json); do
            _jq() {
              echo "${row}" | base64 --decode | jq -r "${1}"
            }

            ATTACHMENT_TYPE=$(_jq '.type')
            ATTACHMENT_URL=$(_jq '.url')
            ATTACHMENT_FILENAME=$(_jq '.filename')

            if [ "$ATTACHMENT_TYPE" = "external" ]; then
              echo "  📥 Downloading external image: $ATTACHMENT_URL"

              # Extract file extension from URL or use .png as default
              EXT="${ATTACHMENT_URL##*.}"
              if [ "${#EXT}" -gt 5 ]; then
                EXT="png"
              fi

              # Download image
              SAFE_FILENAME=$(echo "$ATTACHMENT_FILENAME" | tr -cd 'a-zA-Z0-9._-')
              IMAGE_FILE="$TICKET_ASSETS_DIR/${SAFE_FILENAME}.${EXT}"

              if curl -sSL --max-time 30 --retry 3 "$ATTACHMENT_URL" -o "$IMAGE_FILE"; then
                echo "    ✅ Downloaded: $IMAGE_FILE"
                IMAGE_COUNT=$((IMAGE_COUNT + 1))
                IMAGE_PATHS="$IMAGE_PATHS $IMAGE_FILE"
              else
                echo "    ⚠️ Failed to download: $ATTACHMENT_URL (continuing...)"
              fi
            elif [ "$ATTACHMENT_TYPE" = "uploaded" ]; then
              # For uploaded images stored in Cloudinary, download from URL
              echo "  ☁️ Downloading Cloudinary image: $ATTACHMENT_URL"

              # Extract file extension from filename or URL
              EXT="${ATTACHMENT_FILENAME##*.}"
              if [ "${#EXT}" -gt 5 ] || [ -z "$EXT" ]; then
                EXT="${ATTACHMENT_URL##*.}"
                if [ "${#EXT}" -gt 5 ]; then
                  EXT="png"
                fi
              fi

              # Download image from Cloudinary
              SAFE_FILENAME=$(echo "$ATTACHMENT_FILENAME" | tr -cd 'a-zA-Z0-9._-')
              IMAGE_FILE="$TICKET_ASSETS_DIR/${SAFE_FILENAME}"

              if curl -sSL --max-time 30 --retry 3 "$ATTACHMENT_URL" -o "$IMAGE_FILE"; then
                echo "    ✅ Downloaded from Cloudinary: $IMAGE_FILE"
                IMAGE_COUNT=$((IMAGE_COUNT + 1))
                IMAGE_PATHS="$IMAGE_PATHS $IMAGE_FILE"
              else
                echo "    ⚠️ Failed to download from Cloudinary: $ATTACHMENT_URL (continuing...)"
              fi
            fi
          done

          # Store image paths for later use
          echo "IMAGE_PATHS=$IMAGE_PATHS" >> "$GITHUB_ENV"
          echo "IMAGE_COUNT=$IMAGE_COUNT" >> "$GITHUB_ENV"

          echo "✅ Prepared $IMAGE_COUNT images for Claude context"

      - name: Execute Spec-Kit Command
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          set -e

          case "${{ inputs.command }}" in
            specify)
              # Check if JSON payload is provided (new format with clarificationPolicy)
              if [ -n "${{ inputs.specifyPayload }}" ]; then
                echo "📦 Using JSON payload with clarification policy"
                payload='${{ inputs.specifyPayload }}'

                # Add image paths if available
                if [ -n "$IMAGE_PATHS" ] && [ "$IMAGE_COUNT" -gt 0 ]; then
                  echo "🖼️  Passing $IMAGE_COUNT images to Claude for visual context"

                  # Pass JSON and image paths to /speckit.specify command
                  claude --dangerously-skip-permissions "/speckit.specify $payload" $IMAGE_PATHS
                else
                  # Pass JSON directly to /speckit.specify command (no images)
                  claude --dangerously-skip-permissions "/speckit.specify $payload"
                fi
              else
                # Legacy format: construct prompt from separate fields
                echo "📝 Using legacy text format (no policy)"
                ticket_id="${{ inputs.ticket_id }}"
                ticket_title="${{ inputs.ticketTitle }}"
                ticket_description="${{ inputs.ticketDescription }}"

                printf -v prompt '/speckit.specify #%s %s\n%s\n' "$ticket_id" "$ticket_title" "$ticket_description"

                # Add image paths if available
                if [ -n "$IMAGE_PATHS" ] && [ "$IMAGE_COUNT" -gt 0 ]; then
                  echo "🖼️  Passing $IMAGE_COUNT images to Claude for visual context"
                  claude --dangerously-skip-permissions "$prompt" $IMAGE_PATHS
                else
                  claude --dangerously-skip-permissions "$prompt"
                fi
              fi
              ;;
            plan)
              echo "📋 Executing /speckit.plan command..."
              claude --dangerously-skip-permissions /speckit.plan

              # Commit plan changes
              git add .
              if ! git diff --staged --quiet; then
                git commit -m "feat(ticket-${{ inputs.ticket_id }}): plan - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: plan
          Phase: Planning"

                current_branch="$(git rev-parse --abbrev-ref HEAD)"
                git push origin "$current_branch"
                echo "✅ Plan changes committed and pushed"
              else
                echo "ℹ️ No plan changes to commit"
              fi

              echo "📋 Executing /speckit.tasks command..."
              claude --dangerously-skip-permissions /speckit.tasks

              # Commit tasks changes
              git add .
              if ! git diff --staged --quiet; then
                git commit -m "feat(ticket-${{ inputs.ticket_id }}): tasks - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: plan
          Phase: Task generation"

                current_branch="$(git rev-parse --abbrev-ref HEAD)"
                git push origin "$current_branch"
                echo "✅ Tasks changes committed and pushed"
              else
                echo "ℹ️ No tasks changes to commit"
              fi
              ;;
            task)
              claude --dangerously-skip-permissions /speckit.tasks
              ;;
            implement)
              claude --dangerously-skip-permissions /speckit.implement
              ;;
            clarify)
              echo '${{ inputs.answers_json }}' > clarifications.json
              claude --dangerously-skip-permissions /speckit.clarify --answers clarifications.json
              ;;
            *)
              echo "❌ Unknown command: ${{ inputs.command }}"
              exit 1
              ;;
          esac

      - name: Capture Current Branch
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        env:
          DEFAULT_BRANCH: ${{ inputs.branch || github.ref_name }}
        run: |
          current_branch="$(git rev-parse --abbrev-ref HEAD)"

          if [ -z "$current_branch" ] || [ "$current_branch" = "HEAD" ]; then
            current_branch="$DEFAULT_BRANCH"
          fi

          echo "CURRENT_BRANCH=$current_branch" >> "$GITHUB_ENV"

          # For specify command, also store branch for ticket update
          if [ "${{ inputs.command }}" = "specify" ]; then
            echo "FEATURE_BRANCH=$current_branch" >> "$GITHUB_ENV"
          fi

      - name: Commit and Push Changes
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "feat(ticket-${{ inputs.ticket_id }}): ${{ inputs.command }} - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: ${{ inputs.command }}
          Branch: ${CURRENT_BRANCH}"

            if [ -z "$CURRENT_BRANCH" ]; then
              echo "⚠️ Unable to determine branch to push; skipping git push"
            else
              git push origin "$CURRENT_BRANCH"
            fi

            echo "✅ Changes committed and pushed successfully"
          fi

      - name: Update Documentation
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' }}
        run: |
          claude --dangerously-skip-permissions "Update /specs/specifications/ with spec from specs/${CURRENT_BRANCH}/spec.md. Update CLAUDE.md only if new tech. Don't commit."

          git add specs/specifications/ CLAUDE.md
          if ! git diff --staged --quiet; then
            git commit -m "docs(ticket-${{ inputs.ticket_id }}): update documentation"
            git push origin "$CURRENT_BRANCH"
            echo "✅ Documentation updated and committed"
          else
            echo "ℹ️ No documentation changes needed"
          fi

      - name: Update Ticket Branch (Specify Command)
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && env.FEATURE_BRANCH != '' }}
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          PROJECT_ID: 1
        run: |
          # Update ticket branch field via API
          curl -X PATCH "${APP_URL}/api/projects/${PROJECT_ID}/tickets/${TICKET_ID}/branch" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"branch\": \"${FEATURE_BRANCH}\"}" \
            -f -s -S || echo "⚠️ Failed to update ticket branch field"

          echo "✅ Updated ticket branch to: ${FEATURE_BRANCH}"

      - name: Cleanup Temporary Images (Specify Command)
        if: ${{ always() && env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && env.IMAGE_COUNT != '' && env.IMAGE_COUNT != '0' }}
        run: |
          set -e

          echo "🧹 Cleaning up temporary image files..."

          # Remove temporary ticket assets directory
          TICKET_ASSETS_DIR="ticket-assets/${{ inputs.ticket_id }}"
          if [ -d "$TICKET_ASSETS_DIR" ]; then
            rm -rf "$TICKET_ASSETS_DIR"
            echo "  ✅ Removed temporary directory: $TICKET_ASSETS_DIR"
          fi

          echo "✅ Cleanup complete (images remain in Cloudinary)"

      - name: Update Job Status - Success
        if: ${{ success() && inputs.job_id && env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Skipped (E2E)
        if: ${{ success() && inputs.job_id && env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Failure
        if: ${{ failure() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to FAILED"

      - name: Update Job Status - Cancelled
        if: ${{ cancelled() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "CANCELLED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to CANCELLED"

      - name: Report Success (Skipped)
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          echo "✅ Spec-kit execution skipped because ticket title contains '[e2e]'"
          echo "📍 Branch: ${{ inputs.branch || github.ref_name }}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Success
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          echo "✅ Spec-kit command '${{ inputs.command }}' completed successfully"
          echo "📍 Branch: ${CURRENT_BRANCH:-${{ inputs.branch || github.ref_name }}}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Spec-kit command '${{ inputs.command }}' failed"
          echo "📋 Check logs above for error details"
          exit 1
