name: Spec-Kit Workflow Execution
# Manual trigger workflow for spec-kit command execution

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket identifier (e.g., 016, PROJ-123)'
        required: true
        type: string

      attachments:
        description: 'JSON array of ticket attachments (images for Claude context)'
        required: false
        type: string
        default: '[]'

      specifyPayload:
        description: 'JSON payload with featureDescription and clarificationPolicy (overrides ticketTitle/ticketDescription)'
        required: false
        type: string
        default: ''

      branch:
        description: 'Target branch (optional for specify, required for others)'
        required: false
        type: string
        default: ''

      command:
        description: 'Spec-kit command to execute'
        required: true
        type: choice
        options:
          - specify
          - plan
          - task
          - implement
          - clarify

      answers_json:
        description: 'JSON answers for clarify command (optional)'
        required: false
        type: string
        default: '{}'

      job_id:
        description: 'Job ID for status tracking (optional)'
        required: false
        type: string
        default: ''

      project_id:
        description: 'Project ID (required for specify command to update ticket branch)'
        required: false
        type: string
        default: ''

      githubRepository:
        description: 'GitHub repository in format owner/repo (e.g., bfernandez31/ai-board)'
        required: true
        type: string

jobs:
  run-speckit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write
      pull-requests: write

    # PostgreSQL service container (only for implement command)
    # Health checks ensure database is ready before test execution
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_board_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SKIP_SPECKIT_EXECUTION: ${{ contains(inputs.ticket_id, '[e2e]') }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      # Database connection string for test environment
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_board_test

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Debug workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  project_id: ${{ inputs.project_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  command: ${{ inputs.command }}"
          echo "  githubRepository: ${{ inputs.githubRepository }}"

      - name: Report E2E Skip
        if: ${{ env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ '[e2e]' detected in ticket title; skipping Spec-Kit execution to preserve resources"

      - name: Update Job Status - Running
        if: ${{ inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Checkout repository
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/checkout@v4
        with:
          # Checkout external project repository (format: owner/repo)
          repository: ${{ inputs.githubRepository }}
          # For specify command, always checkout main (branch will be created later)
          # For other commands, checkout the provided branch
          ref: ${{ inputs.command == 'specify' && 'main' || inputs.branch || github.ref }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Cache Bun Dependencies
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node.js
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup Python
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' }}
        run: bun install --frozen-lockfile

      - name: Detect Project Dependencies
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' }}
        run: |
          echo "🔍 Detecting project dependencies..."

          # Check for Prisma
          if [ -f "package.json" ] && grep -q '"prisma"' package.json; then
            echo "✅ Prisma detected in package.json"
            echo "HAS_PRISMA=true" >> $GITHUB_ENV
          elif [ -f "prisma/schema.prisma" ]; then
            echo "✅ Prisma detected (schema.prisma exists)"
            echo "HAS_PRISMA=true" >> $GITHUB_ENV
          else
            echo "ℹ️ Prisma not detected - skipping database setup"
            echo "HAS_PRISMA=false" >> $GITHUB_ENV
          fi

          # Check for Playwright
          if [ -f "package.json" ] && grep -q '"@playwright/test"' package.json; then
            echo "✅ Playwright detected in package.json"
            echo "HAS_PLAYWRIGHT=true" >> $GITHUB_ENV
          elif [ -f "playwright.config.ts" ] || [ -f "playwright.config.js" ]; then
            echo "✅ Playwright detected (config file exists)"
            echo "HAS_PLAYWRIGHT=true" >> $GITHUB_ENV
          else
            echo "ℹ️ Playwright not detected - skipping E2E setup"
            echo "HAS_PLAYWRIGHT=false" >> $GITHUB_ENV
          fi

      - name: Install Claude Code CLI
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Setup Test Environment
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "🔧 Setting up test environment..."
          .github/scripts/setup-test-env.sh

      - name: Prepare Images for Claude (Specify Command)
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && inputs.attachments != '[]' }}
        run: |
          set -e

          # Call reusable script to download and prepare images
          IMAGE_PATHS=$(.specify/scripts/bash/prepare-images.sh \
            "${{ inputs.ticket_id }}" \
            '${{ inputs.attachments }}')

          # Store image paths for Claude execution step
          echo "IMAGE_PATHS=$IMAGE_PATHS" >> "$GITHUB_ENV"
          echo "IMAGE_COUNT=$(echo $IMAGE_PATHS | wc -w | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Prepare Specify Payload
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && inputs.specifyPayload != '' }}
        run: |
          # Write JSON payload to temp file to avoid bash escaping issues
          cat > /tmp/specify_payload.json <<'EOF'
          ${{ inputs.specifyPayload }}
          EOF
          echo "SPECIFY_PAYLOAD_FILE=/tmp/specify_payload.json" >> "$GITHUB_ENV"

      # Database setup steps (implement command only)
      - name: Generate Prisma Client
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && env.HAS_PRISMA == 'true' }}
        run: npx prisma generate

      - name: Apply Database Migrations
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && env.HAS_PRISMA == 'true' }}
        run: npx prisma migrate deploy

      - name: Seed Test Database
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && env.HAS_PRISMA == 'true' }}
        run: npx tsx tests/global-setup.ts

      # Playwright setup steps (implement command only)
      - name: Get Playwright Version
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && env.HAS_PLAYWRIGHT == 'true' }}
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && env.HAS_PLAYWRIGHT == 'true' }}
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && env.HAS_PLAYWRIGHT == 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Execute Spec-Kit Command
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          set -e

          case "${{ inputs.command }}" in
            specify)
              echo "📦 Using JSON payload with clarification policy"

              # Read payload from file
              payload=$(cat "$SPECIFY_PAYLOAD_FILE")

              # Add image paths if available
              if [ -n "$IMAGE_PATHS" ] && [ "$IMAGE_COUNT" -gt 0 ]; then
                echo "🖼️  Passing $IMAGE_COUNT images to Claude for visual context"
                claude --dangerously-skip-permissions "/speckit.specify $payload" $IMAGE_PATHS
              else
                claude --dangerously-skip-permissions "/speckit.specify $payload"
              fi
              ;;
            plan)
              echo "📋 Executing /speckit.plan command..."
              claude --dangerously-skip-permissions /speckit.plan

              # Commit plan changes
              git add .
              if ! git diff --staged --quiet; then
                git commit -m "feat(ticket-${{ inputs.ticket_id }}): plan - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: plan
          Phase: Planning"

                current_branch="$(git rev-parse --abbrev-ref HEAD)"
                git push origin "$current_branch"
                echo "✅ Plan changes committed and pushed"
              else
                echo "ℹ️ No plan changes to commit"
              fi

              echo "📋 Executing /speckit.tasks command..."
              claude --dangerously-skip-permissions /speckit.tasks

              # Commit tasks changes
              git add .
              if ! git diff --staged --quiet; then
                git commit -m "feat(ticket-${{ inputs.ticket_id }}): tasks - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: plan
          Phase: Task generation"

                current_branch="$(git rev-parse --abbrev-ref HEAD)"
                git push origin "$current_branch"
                echo "✅ Tasks changes committed and pushed"
              else
                echo "ℹ️ No tasks changes to commit"
              fi
              ;;
            task)
              claude --dangerously-skip-permissions /speckit.tasks
              ;;
            implement)
              claude --dangerously-skip-permissions "/speckit.implement IMPORTANT: never prompt me; you must always fix and complete the implementation, never run the full test suite, only impacted tests. Do the commit and push, continue fix if needed"
              ;;
            clarify)
              echo '${{ inputs.answers_json }}' > clarifications.json
              claude --dangerously-skip-permissions /speckit.clarify --answers clarifications.json
              ;;
            *)
              echo "❌ Unknown command: ${{ inputs.command }}"
              exit 1
              ;;
          esac

      - name: Detect Incomplete Implementation (Implement Command)
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' }}
        id: detect-incomplete
        run: |
          set -e

          echo "🔍 Checking implementation completion status..."

          # Determine feature directory (branch-based or ticket-based)
          FEATURE_DIR=""
          current_branch="$(git rev-parse --abbrev-ref HEAD)"

          # Try branch-based directory first (e.g., specs/045-visual-distinction-between)
          if [[ "$current_branch" =~ ^[0-9]+-(.+)$ ]]; then
            branch_dir="specs/$current_branch"
            if [[ -d "$branch_dir" ]]; then
              FEATURE_DIR="$branch_dir"
            fi
          fi

          # Fallback to ticket-based directory (e.g., specs/045-*/)
          if [[ -z "$FEATURE_DIR" && "${{ inputs.ticket_id }}" =~ ^([0-9]+) ]]; then
            ticket_num="${BASH_REMATCH[1]}"
            matching_dir=$(find specs -maxdepth 1 -type d -name "${ticket_num}-*" | head -1)
            if [[ -n "$matching_dir" ]]; then
              FEATURE_DIR="$matching_dir"
            fi
          fi

          if [[ -z "$FEATURE_DIR" || ! -d "$FEATURE_DIR" ]]; then
            echo "⚠️  Could not find feature directory for ticket ${{ inputs.ticket_id }}"
            echo "   Skipping completion detection"
            echo "needs_continue=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📁 Feature directory: $FEATURE_DIR"

          # Run detection script
          if ! .specify/scripts/bash/detect-incomplete-implementation.sh "$FEATURE_DIR" --json > /tmp/detection-result.json; then
            # Script returned non-zero (incomplete or error)
            cat /tmp/detection-result.json

            # Parse JSON result
            needs_continue=$(jq -r '.needs_continue' /tmp/detection-result.json)
            incomplete_count=$(jq -r '.incomplete_tasks' /tmp/detection-result.json)
            reason=$(jq -r '.reason' /tmp/detection-result.json)

            echo "needs_continue=$needs_continue" >> $GITHUB_OUTPUT
            echo "incomplete_count=$incomplete_count" >> $GITHUB_OUTPUT
            echo "reason=$reason" >> $GITHUB_OUTPUT

            if [[ "$needs_continue" == "true" ]]; then
              echo "⚠️  Implementation incomplete: $reason"
              echo "   Incomplete tasks: $incomplete_count"
              echo "   Will retry with --continue flag"
            fi
          else
            # Script returned zero (complete)
            echo "✅ Implementation complete!"
            echo "needs_continue=false" >> $GITHUB_OUTPUT
          fi

      - name: Continue Implementation (Retry Loop)
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' && steps.detect-incomplete.outputs.needs_continue == 'true' }}
        run: |
          set -e

          MAX_RETRIES=2
          retry_count=0

          echo "🔄 Starting implementation continuation loop (max $MAX_RETRIES retries)"

          while [[ $retry_count -lt $MAX_RETRIES ]]; do
            retry_count=$((retry_count + 1))

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Retry $retry_count / $MAX_RETRIES"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""

            # Run implement with --continue flag
            echo "📦 Executing: /speckit.implement --continue"
            if claude --dangerously-skip-permissions "/speckit.implement --continue IMPORTANT: never prompt me; you must always fix and complete the implementation, never run the full test suite, only impacted tests. Do the commit and push, continue fix if needed"; then
              echo "✅ Implementation retry succeeded"
            else
              echo "⚠️  Implementation retry failed (exit code: $?)"
            fi

            # Determine feature directory again
            FEATURE_DIR=""
            current_branch="$(git rev-parse --abbrev-ref HEAD)"

            if [[ "$current_branch" =~ ^[0-9]+-(.+)$ ]]; then
              branch_dir="specs/$current_branch"
              if [[ -d "$branch_dir" ]]; then
                FEATURE_DIR="$branch_dir"
              fi
            fi

            if [[ -z "$FEATURE_DIR" && "${{ inputs.ticket_id }}" =~ ^([0-9]+) ]]; then
              ticket_num="${BASH_REMATCH[1]}"
              matching_dir=$(find specs -maxdepth 1 -type d -name "${ticket_num}-*" | head -1)
              if [[ -n "$matching_dir" ]]; then
                FEATURE_DIR="$matching_dir"
              fi
            fi

            if [[ -z "$FEATURE_DIR" ]]; then
              echo "⚠️  Could not find feature directory, stopping retries"
              break
            fi

            # Check completion status again
            echo ""
            echo "🔍 Re-checking implementation completion status..."

            if .specify/scripts/bash/detect-incomplete-implementation.sh "$FEATURE_DIR" --json > /tmp/retry-detection-result.json; then
              # Complete!
              echo "✅ Implementation now complete after retry $retry_count"
              cat /tmp/retry-detection-result.json
              break
            else
              # Still incomplete
              needs_continue=$(jq -r '.needs_continue' /tmp/retry-detection-result.json)
              incomplete_count=$(jq -r '.incomplete_tasks' /tmp/retry-detection-result.json)

              cat /tmp/retry-detection-result.json

              if [[ "$needs_continue" != "true" ]]; then
                echo "✅ Implementation intentionally scoped (not all tasks needed)"
                break
              fi

              if [[ $retry_count -ge $MAX_RETRIES ]]; then
                echo "⚠️  Max retries reached with $incomplete_count tasks still incomplete"
                echo "   Manual intervention may be required"
                break
              fi

              echo "⏳ Still $incomplete_count tasks incomplete, continuing..."
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🏁 Implementation continuation complete (after $retry_count retries)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Capture Current Branch
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        env:
          DEFAULT_BRANCH: ${{ inputs.branch || github.ref_name }}
        run: |
          current_branch="$(git rev-parse --abbrev-ref HEAD)"

          if [ -z "$current_branch" ] || [ "$current_branch" = "HEAD" ]; then
            current_branch="$DEFAULT_BRANCH"
          fi

          echo "CURRENT_BRANCH=$current_branch" >> "$GITHUB_ENV"

          # For specify command, also store branch for ticket update
          if [ "${{ inputs.command }}" = "specify" ]; then
            echo "FEATURE_BRANCH=$current_branch" >> "$GITHUB_ENV"
          fi

      - name: Cleanup Temporary Images Before Commit
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && env.IMAGE_COUNT != '' && env.IMAGE_COUNT != '0' }}
        run: |
          echo "🧹 Cleaning up temporary image files before commit..."
          TICKET_ASSETS_DIR="ticket-assets/${{ inputs.ticket_id }}"
          if [ -d "$TICKET_ASSETS_DIR" ]; then
            rm -rf "$TICKET_ASSETS_DIR"
            echo "  ✅ Removed temporary directory: $TICKET_ASSETS_DIR"
          fi
          echo "✅ Cleanup complete (images remain in Cloudinary)"

      - name: Commit and Push Changes
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to commit (Claude may have already committed)"
          else
            git commit -m "feat(ticket-${{ inputs.ticket_id }}): ${{ inputs.command }} - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: ${{ inputs.command }}
          Branch: ${CURRENT_BRANCH}"
            echo "✅ Changes committed"
          fi

          # Always push (Claude may have committed during command execution)
          if [ -z "$CURRENT_BRANCH" ]; then
            echo "⚠️ Unable to determine branch to push; skipping git push"
          else
            git push origin "$CURRENT_BRANCH"
            echo "✅ Changes pushed to branch: ${CURRENT_BRANCH}"
          fi

      # Documentation update removed - now handled in verify workflow
      # Global documentation is updated only once before PR creation (verify stage)
      # This avoids:
      # - Multiple doc commits during spec iterations
      # - Conflicts on global documentation files
      # - Outdated docs during development phases

      - name: Update Ticket Branch (Specify Command)
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && env.FEATURE_BRANCH != '' }}
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          # Update ticket branch field via API
          curl -X PATCH "${APP_URL}/api/projects/${PROJECT_ID}/tickets/${TICKET_ID}/branch" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d "{\"branch\": \"${FEATURE_BRANCH}\"}" \
            -f -s -S || echo "⚠️ Failed to update ticket branch field"

          echo "✅ Updated ticket branch to: ${FEATURE_BRANCH}"

      - name: Cleanup Temporary Images (Specify Command)
        if: ${{ always() && env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'specify' && env.IMAGE_COUNT != '' && env.IMAGE_COUNT != '0' }}
        run: |
          set -e

          echo "🧹 Cleaning up temporary image files..."

          # Remove temporary ticket assets directory
          TICKET_ASSETS_DIR="ticket-assets/${{ inputs.ticket_id }}"
          if [ -d "$TICKET_ASSETS_DIR" ]; then
            rm -rf "$TICKET_ASSETS_DIR"
            echo "  ✅ Removed temporary directory: $TICKET_ASSETS_DIR"
          fi

          echo "✅ Cleanup complete (images remain in Cloudinary)"

      - name: Update Job Status - Success
        if: ${{ success() && inputs.job_id && env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Skipped (E2E)
        if: ${{ success() && inputs.job_id && env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Failure
        if: ${{ failure() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to FAILED"

      - name: Update Job Status - Cancelled
        if: ${{ cancelled() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "CANCELLED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to CANCELLED"

      - name: Transition to VERIFY (Implement Command)
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' && inputs.command == 'implement' }}
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          echo "🔄 Transitioning ticket to VERIFY stage..."
          echo "   This will trigger the verify workflow to run tests and create PR"
          .specify/scripts/bash/transition-to-verify.sh \
            "${TICKET_ID}" \
            "${PROJECT_ID}" \
            "${APP_URL}" \
            "${WORKFLOW_API_TOKEN}"

      - name: Report Success (Skipped)
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          echo "✅ Spec-kit execution skipped because ticket title contains '[e2e]'"
          echo "📍 Branch: ${{ inputs.branch || github.ref_name }}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Success
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          echo "✅ Spec-kit command '${{ inputs.command }}' completed successfully"
          echo "📍 Branch: ${CURRENT_BRANCH:-${{ inputs.branch || github.ref_name }}}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"
          if [ "${{ inputs.command }}" = "implement" ]; then
            echo "🔄 Ticket transitioned to VERIFY - tests will run next"
          fi

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Spec-kit command '${{ inputs.command }}' failed"
          echo "📋 Check logs above for error details"
          exit 1
