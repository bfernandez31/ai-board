name: Spec-Kit Workflow Execution
# Manual trigger workflow for spec-kit command execution

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket identifier (e.g., 016, PROJ-123)'
        required: true
        type: string

      ticketTitle:
        description: 'Ticket title for context'
        required: true
        type: string

      ticketDescription:
        description: 'Detailed ticket description'
        required: true
        type: string

      branch:
        description: 'Target branch (optional for specify, required for others)'
        required: false
        type: string
        default: ''

      command:
        description: 'Spec-kit command to execute'
        required: true
        type: choice
        options:
          - specify
          - plan
          - task
          - implement
          - clarify

      answers_json:
        description: 'JSON answers for clarify command (optional)'
        required: false
        type: string
        default: '{}'

jobs:
  run-speckit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SKIP_SPECKIT_EXECUTION: ${{ contains(inputs.ticketTitle, '[e2e]') }}

    steps:
      - name: Report E2E Skip
        if: ${{ env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ '[e2e]' detected in ticket title; skipping Spec-Kit execution to preserve resources"

      - name: Checkout repository
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup Python
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Execute Spec-Kit Command
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          set -e

          case "${{ inputs.command }}" in
            specify)
              ticket_id="${{ inputs.ticket_id }}"
              ticket_title="${{ inputs.ticketTitle }}"
              ticket_description="${{ inputs.ticketDescription }}"

              printf -v prompt '#%s %s\n%s\n' "$ticket_id" "$ticket_title" "$ticket_description"

              claude --dangerously-skip-permissions /specify "$prompt"
              ;;
            plan)
              claude --dangerously-skip-permissions /plan
              ;;
            task)
              claude --dangerously-skip-permissions /task
              ;;
            implement)
              claude --dangerously-skip-permissions /implement
              ;;
            clarify)
              echo '${{ inputs.answers_json }}' > clarifications.json
              claude --dangerously-skip-permissions /clarify --answers clarifications.json
              ;;
            *)
              echo "❌ Unknown command: ${{ inputs.command }}"
              exit 1
              ;;
          esac

      - name: Commit and Push Changes
        if: ${{ env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "feat(ticket-${{ inputs.ticket_id }}): ${{ inputs.command }} - automated spec-kit execution

          Generated by GitHub Actions workflow
          Ticket: ${{ inputs.ticket_id }}
          Command: ${{ inputs.command }}
          Branch: ${{ inputs.branch }}"

            git push origin ${{ inputs.branch || github.ref_name }}

            echo "✅ Changes committed and pushed successfully"
          fi

      - name: Report Success (Skipped)
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION == 'true' }}
        run: |
          echo "✅ Spec-kit execution skipped because ticket title contains '[e2e]'"
          echo "📍 Branch: ${{ inputs.branch || github.ref_name }}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Success
        if: ${{ success() && env.SKIP_SPECKIT_EXECUTION != 'true' }}
        run: |
          echo "✅ Spec-kit command '${{ inputs.command }}' completed successfully"
          echo "📍 Branch: ${{ inputs.branch || github.ref_name }}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Spec-kit command '${{ inputs.command }}' failed"
          echo "📋 Check logs above for error details"
          exit 1
