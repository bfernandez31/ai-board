name: Rollback Reset

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket key (e.g., ABC-123)'
        required: true
        type: string
      project_id:
        description: 'Project ID for authorization'
        required: true
        type: string
      branch:
        description: 'Git branch to reset'
        required: true
        type: string
      job_id:
        description: 'Job ID to update status'
        required: true
        type: string
      githubRepository:
        description: 'GitHub repository in format owner/repo (e.g., bfernandez31/ai-board)'
        required: true
        type: string

env:
  APP_URL: ${{ vars.APP_URL }}
  WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
  BRANCH_NAME: ${{ inputs.branch }}

jobs:
  rollback-reset:
    name: Rollback from VERIFY to PLAN
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # --- Update job to RUNNING ---
      - name: Update job status - RUNNING
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "RUNNING"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status

      # --- Checkout target repository at feature branch ---
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.githubRepository }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # --- Configure git user ---
      - name: Configure git
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      # --- Verify branch exists ---
      - name: Verify branch exists
        run: |
          if ! git rev-parse --verify HEAD &>/dev/null; then
            echo "::error::Branch '${{ inputs.branch }}' does not exist or checkout failed"
            exit 1
          fi
          echo "Branch verified: ${{ inputs.branch }}"
          echo "Current HEAD: $(git rev-parse HEAD)"
          echo "Total commits on branch: $(git rev-list --count HEAD)"

      # --- Backup spec files to temp directory ---
      - name: Backup spec files
        id: backup
        run: |
          SPEC_DIR="specs/${{ inputs.branch }}"
          BACKUP_DIR="/tmp/spec-backup"

          echo "Looking for spec files in: $SPEC_DIR"

          if [ -d "$SPEC_DIR" ]; then
            mkdir -p "$BACKUP_DIR"
            cp -r "$SPEC_DIR" "$BACKUP_DIR/"
            echo "has_specs=true" >> $GITHUB_OUTPUT
            echo "Spec files backed up:"
            ls -la "$BACKUP_DIR/$(basename $SPEC_DIR)/"
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "No spec folder found at $SPEC_DIR"
          fi

      # --- Reset branch to main (keeping nothing) ---
      - name: Reset to main branch
        run: |
          echo "Current branch state:"
          git log --oneline -5

          echo ""
          echo "Resetting to origin/main..."

          # Get the merge-base (where branch diverged from main)
          MERGE_BASE=$(git merge-base origin/main HEAD)
          echo "Merge base with main: $MERGE_BASE"

          # Hard reset to merge-base (removes ALL branch commits)
          git reset --hard "$MERGE_BASE"

          echo ""
          echo "After reset:"
          git log --oneline -3

      # --- Restore and commit spec files ---
      - name: Restore spec files
        if: steps.backup.outputs.has_specs == 'true'
        run: |
          SPEC_DIR="specs/${{ inputs.branch }}"
          BACKUP_DIR="/tmp/spec-backup/$(basename $SPEC_DIR)"

          echo "Restoring spec files from backup..."

          # Create specs directory structure
          mkdir -p "$(dirname $SPEC_DIR)"

          # Copy spec files back
          cp -r "$BACKUP_DIR" "$SPEC_DIR"

          echo "Restored spec files:"
          ls -la "$SPEC_DIR/"

          # Stage spec files
          git add "$SPEC_DIR"

          # Commit with clear rollback message
          git commit -m "rollback(VERIFY→PLAN): preserve spec files for ${{ inputs.ticket_id }}

Implementation removed due to VERIFY stage rollback.
Spec files (spec.md, plan.md, tasks.md) preserved for re-implementation.

Triggered by: ai-board rollback workflow
Ticket: ${{ inputs.ticket_id }}"

          echo "Spec files committed"

      # --- Handle case with no specs ---
      - name: Create empty rollback commit
        if: steps.backup.outputs.has_specs != 'true'
        run: |
          # Create an empty commit to mark the rollback
          git commit --allow-empty -m "rollback(VERIFY→PLAN): reset branch for ${{ inputs.ticket_id }}

Implementation removed due to VERIFY stage rollback.
No spec files found to preserve.

Triggered by: ai-board rollback workflow
Ticket: ${{ inputs.ticket_id }}"

          echo "Empty rollback commit created"

      # --- Force push reset branch ---
      - name: Force push reset branch
        run: |
          echo "Force pushing to ${{ inputs.branch }}..."

          # First attempt
          if git push origin "${{ inputs.branch }}" --force; then
            echo "Push successful"
            exit 0
          fi

          echo "First push attempt failed, retrying in 5 seconds..."
          sleep 5

          # Retry once
          if git push origin "${{ inputs.branch }}" --force; then
            echo "Push successful on retry"
            exit 0
          fi

          echo "::error::Failed to push after retry"
          exit 1

      # --- Update job status to COMPLETED ---
      - name: Update job status - COMPLETED
        if: success()
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "COMPLETED"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status
          echo "Job marked as COMPLETED"

      # --- Update job status to FAILED ---
      - name: Update job status - FAILED
        if: failure()
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "FAILED"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status
          echo "Job marked as FAILED"
