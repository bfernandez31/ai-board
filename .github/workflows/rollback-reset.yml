name: Rollback Reset

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket key (e.g., ABC-123)'
        required: true
        type: string
      project_id:
        description: 'Project ID for authorization'
        required: true
        type: string
      branch:
        description: 'Git branch to reset'
        required: true
        type: string
      job_id:
        description: 'Job ID to update status'
        required: true
        type: string
      githubRepository:
        description: 'GitHub repository in format owner/repo (e.g., bfernandez31/ai-board)'
        required: true
        type: string

env:
  APP_URL: ${{ vars.APP_URL }}
  WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
  BRANCH_NAME: ${{ inputs.branch }}

jobs:
  rollback-reset:
    name: Git Reset to Pre-BUILD State
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # --- Update job to RUNNING ---
      - name: Update job status - RUNNING
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "RUNNING"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status

      # --- Checkout target repository at feature branch ---
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.githubRepository }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0  # Full history needed for reset

      # --- Configure git user ---
      - name: Configure git
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      # --- Verify branch exists ---
      - name: Verify branch exists
        run: |
          if ! git rev-parse --verify HEAD &>/dev/null; then
            echo "::error::Branch '${{ inputs.branch }}' does not exist or checkout failed"
            exit 1
          fi
          echo "Branch verified: ${{ inputs.branch }}"
          echo "Current HEAD: $(git rev-parse HEAD)"

      # --- Fetch implement job startedAt time from API ---
      - name: Identify reset target commit
        id: find_commit
        run: |
          echo "Fetching implement job information..."

          # Get the implement job's startedAt time from the API
          # We look for the last implement job for this ticket/project
          JOBS_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            "${{ env.APP_URL }}/api/projects/${{ inputs.project_id }}/jobs/status" || echo "")

          echo "Jobs API response received"

          # Find the implement job and get its startedAt
          IMPLEMENT_STARTED_AT=""
          if [ -n "$JOBS_RESPONSE" ]; then
            # Parse JSON to find implement job startedAt (using jq if available, or grep fallback)
            if command -v jq &>/dev/null; then
              IMPLEMENT_STARTED_AT=$(echo "$JOBS_RESPONSE" | jq -r '.jobs[] | select(.command=="implement") | .startedAt' 2>/dev/null | head -1)
            fi
          fi

          # Method 1: Find commit before implement job started
          if [ -n "$IMPLEMENT_STARTED_AT" ] && [ "$IMPLEMENT_STARTED_AT" != "null" ]; then
            echo "Found implement job startedAt: $IMPLEMENT_STARTED_AT"
            RESET_COMMIT=$(git log --before="$IMPLEMENT_STARTED_AT" -1 --format="%H" 2>/dev/null || echo "")
            if [ -n "$RESET_COMMIT" ]; then
              echo "Found commit before implement: $RESET_COMMIT"
              echo "reset_commit=$RESET_COMMIT" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Method 2: Fallback - find last commit with "plan" or "tasks" in message
          echo "Fallback: Looking for plan/tasks commit..."
          RESET_COMMIT=$(git log --all --oneline --grep="plan\|tasks" --format="%H" | head -1)
          if [ -n "$RESET_COMMIT" ]; then
            echo "Found plan/tasks commit: $RESET_COMMIT"
            echo "reset_commit=$RESET_COMMIT" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Method 3: Fallback - find commit with spec folder changes only
          echo "Fallback: Looking for last spec-only commit..."
          RESET_COMMIT=$(git log --all --format="%H" -- "specs/${{ inputs.branch }}/" 2>/dev/null | head -1)
          if [ -n "$RESET_COMMIT" ]; then
            echo "Found spec folder commit: $RESET_COMMIT"
            echo "reset_commit=$RESET_COMMIT" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Method 4: Final fallback - use first commit on branch (may have no implementation)
          echo "Warning: Could not find ideal reset point, using merge-base with main"
          RESET_COMMIT=$(git merge-base origin/main HEAD 2>/dev/null || echo "")
          if [ -n "$RESET_COMMIT" ]; then
            echo "Using merge-base: $RESET_COMMIT"
            echo "reset_commit=$RESET_COMMIT" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "::error::Could not find suitable reset commit"
          exit 1

      # --- Backup spec folder ---
      - name: Backup spec folder
        id: backup_specs
        run: |
          SPEC_DIR="specs/${{ inputs.branch }}"

          if [ -d "$SPEC_DIR" ]; then
            echo "Spec folder found: $SPEC_DIR"
            # Stash spec folder including any untracked files
            git stash push --include-untracked -- "$SPEC_DIR" || {
              echo "::error::Failed to stash spec folder"
              exit 1
            }
            echo "spec_stashed=true" >> $GITHUB_OUTPUT
            echo "Spec folder stashed successfully"
          else
            echo "No spec folder at $SPEC_DIR - nothing to preserve"
            echo "spec_stashed=false" >> $GITHUB_OUTPUT
          fi

      # --- Execute git reset ---
      - name: Execute git reset
        run: |
          RESET_COMMIT="${{ steps.find_commit.outputs.reset_commit }}"
          echo "Resetting to commit: $RESET_COMMIT"
          echo "Commit message: $(git log -1 --format='%s' $RESET_COMMIT)"

          git reset --hard "$RESET_COMMIT" || {
            echo "::error::Git reset failed"
            exit 1
          }

          echo "Reset successful. Current HEAD: $(git rev-parse HEAD)"

      # --- Restore spec folder ---
      - name: Restore spec folder
        if: steps.backup_specs.outputs.spec_stashed == 'true'
        run: |
          echo "Restoring stashed spec folder..."

          # Pop the stash to restore spec folder
          git stash pop || {
            echo "::error::Failed to restore spec folder from stash"
            exit 1
          }

          # Stage and commit the restored spec files
          SPEC_DIR="specs/${{ inputs.branch }}"
          if [ -d "$SPEC_DIR" ]; then
            git add "$SPEC_DIR"
            # Only commit if there are changes
            if ! git diff --cached --quiet; then
              git commit -m "chore: preserve spec files during rollback"
              echo "Spec files committed"
            else
              echo "No changes to spec files"
            fi
          fi

      # --- Force push reset branch ---
      - name: Force push reset branch
        id: push
        run: |
          echo "Force pushing to ${{ inputs.branch }}..."

          # First attempt
          if git push origin "${{ inputs.branch }}" --force; then
            echo "Push successful"
            exit 0
          fi

          echo "First push attempt failed, retrying in 5 seconds..."
          sleep 5

          # Retry once
          if git push origin "${{ inputs.branch }}" --force; then
            echo "Push successful on retry"
            exit 0
          fi

          echo "::error::Failed to push after retry"
          exit 1

      # --- Update job status to COMPLETED ---
      - name: Update job status - COMPLETED
        if: success()
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "COMPLETED"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status
          echo "Job marked as COMPLETED"

      # --- Update job status to FAILED ---
      - name: Update job status - FAILED
        if: failure()
        run: |
          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_API_TOKEN }}" \
            -d '{"status": "FAILED"}' \
            ${{ env.APP_URL }}/api/jobs/${{ inputs.job_id }}/status
          echo "Job marked as FAILED"
