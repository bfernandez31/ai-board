name: Iterate on Verify Feedback
# Handles minor fixes discovered during VERIFY stage without changing ticket state

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID'
        required: true
        type: string

      job_id:
        description: 'Job ID for status tracking'
        required: true
        type: string

      project_id:
        description: 'Project ID'
        required: true
        type: string

      branch:
        description: 'Feature branch name'
        required: true
        type: string

      issues_to_fix:
        description: 'JSON array of issues to fix'
        required: true
        type: string

      githubRepository:
        description: 'GitHub repository in format owner/repo'
        required: true
        type: string

jobs:
  iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      SKIP_EXECUTION: ${{ contains(inputs.ticket_id, '[e2e]') }}
      # Claude Code telemetry - export to console for parsing
      CLAUDE_CODE_ENABLE_TELEMETRY: "1"
      OTEL_LOGS_EXPORTER: "console"

    steps:
      - name: Debug Inputs
        run: |
          echo "🔄 Iterate workflow starting"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  branch: ${{ inputs.branch }}"
          echo "  issues: ${{ inputs.issues_to_fix }}"
          echo "  repository: ${{ inputs.githubRepository }}"

      - name: Update Job Status - Running
        if: ${{ inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

      - name: Handle E2E Skip
        if: ${{ env.SKIP_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ Skipping iteration for [e2e] test ticket"
          exit 0

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.githubRepository }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Environment
        run: |
          # Setup Node.js
          echo "📦 Setting up Node.js..."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Install Claude CLI
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Execute Iteration Fixes
        id: iterate
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          BRANCH: ${{ inputs.branch }}
          PROJECT_ID: ${{ inputs.project_id }}
          ISSUES: ${{ inputs.issues_to_fix }}
        run: |
          # Initialize telemetry log file
          TELEMETRY_LOG="/tmp/claude-telemetry.log"
          > "$TELEMETRY_LOG"
          echo "TELEMETRY_LOG=$TELEMETRY_LOG" >> "$GITHUB_ENV"

          # Wrapper function to run claude and capture telemetry
          run_claude() {
            "$@" 2> >(tee -a "$TELEMETRY_LOG" >&2)
          }

          echo "🔧 Executing iteration fixes..."
          echo "Issues to fix: $ISSUES"

          # Execute Claude iterate-verify command
          run_claude claude --dangerously-skip-permissions "/iterate-verify" > output.log || true

          # Check if changes were made
          if git diff --quiet; then
            echo "ℹ️ No changes were needed"
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Changes applied successfully"
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Global Specifications
        if: steps.iterate.outputs.no_changes != 'true'
        run: |
          echo "📚 Updating global specifications..."

          # Wrapper function to run claude and capture telemetry
          run_claude() {
            "$@" 2> >(tee -a "$TELEMETRY_LOG" >&2)
          }

          # Update specs/specifications with changes from this iteration
          run_claude claude --dangerously-skip-permissions "/sync-specifications \
            --branch ${{ inputs.branch }} \
            --source specs/${{ inputs.branch }}/ \
            --target specs/specifications/"

      - name: Commit and Push Changes
        if: steps.iterate.outputs.no_changes != 'true'
        run: |
          echo "💾 Committing iteration changes..."

          # Add all changes
          git add .

          # Create detailed commit message
          COMMIT_MSG="iterate: address verify stage feedback

          Ticket: ${{ inputs.ticket_id }}
          Type: Minor iteration during VERIFY

          Fixed issues:
          ${{ inputs.issues_to_fix }}

          - Updated implementation based on testing feedback
          - Synchronized branch specifications
          - Updated global documentation

          Generated by AI-BOARD iterate workflow"

          git commit -m "$COMMIT_MSG"
          git push origin ${{ inputs.branch }}

          echo "✅ Changes pushed to branch: ${{ inputs.branch }}"

      - name: Send Claude Telemetry Metrics
        if: ${{ always() && env.TELEMETRY_LOG != '' }}
        run: |
          .specify/scripts/bash/send-claude-metrics.sh \
            "$TELEMETRY_LOG" \
            "${{ inputs.job_id }}" \
            "${APP_URL}" \
            "${WORKFLOW_API_TOKEN}"

      - name: Update Job Status - Success
        if: success()
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

      - name: Update Job Status - Failure
        if: failure()
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"