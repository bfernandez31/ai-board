name: Iterate on Verify Feedback
# Handles minor fixes discovered during VERIFY stage without changing ticket state

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID'
        required: true
        type: string

      job_id:
        description: 'Job ID for status tracking'
        required: true
        type: string

      project_id:
        description: 'Project ID'
        required: true
        type: string

      branch:
        description: 'Feature branch name'
        required: true
        type: string

      issues_to_fix:
        description: 'JSON array of issues to fix'
        required: true
        type: string

      githubRepository:
        description: 'GitHub repository in format owner/repo'
        required: true
        type: string

      agent:
        description: 'Agent CLI to use (CLAUDE or CODEX)'
        required: true
        type: string

jobs:
  iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      AGENT: ${{ inputs.agent }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      SKIP_EXECUTION: ${{ contains(inputs.ticket_id, '[e2e]') }}
      # Use Opus model for Claude Code
      ANTHROPIC_MODEL: "claude-opus-4-6"
      # Claude Code telemetry - send to OTLP endpoint
      CLAUDE_CODE_ENABLE_TELEMETRY: "1"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/json"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.APP_URL }}/api/telemetry
      OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Bearer ${{ secrets.WORKFLOW_API_TOKEN }}"
      OTEL_RESOURCE_ATTRIBUTES: "job_id=${{ inputs.job_id }}"

    steps:
      - name: Debug Inputs
        env:
          ISSUES_TO_FIX: ${{ inputs.issues_to_fix }}
        run: |
          echo "🔄 Iterate workflow starting"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  branch: ${{ inputs.branch }}"
          echo "  issues: $ISSUES_TO_FIX"
          echo "  repository: ${{ inputs.githubRepository }}"

      - name: Update Job Status - Running
        if: ${{ inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

      - name: Handle E2E Skip
        if: ${{ env.SKIP_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ Skipping iteration for [e2e] test ticket"
          exit 0

      - name: Checkout ai-board (sparse - plugin only)
        uses: actions/checkout@v4
        with:
          path: ai-board
          sparse-checkout: |
            .claude-plugin
            .github/scripts
          sparse-checkout-cone-mode: true

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.githubRepository }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          path: target

      - name: Setup ai-board commands and skills
        run: |
          # Create symlinks so Claude can find ai-board commands and skills in target repo
          mkdir -p target/.claude
          ln -sf ../../ai-board/.claude-plugin/commands target/.claude/commands
          ln -sf ../../ai-board/.claude-plugin/skills target/.claude/skills
          echo "✅ ai-board commands linked to target/.claude/commands"
          echo "✅ ai-board skills linked to target/.claude/skills"

      - name: Setup Environment
        run: |
          # Setup Node.js
          echo "📦 Setting up Node.js..."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Install Agent CLI
        run: ../ai-board/.github/scripts/run-agent.sh install

      - name: Setup Agent Environment
        working-directory: target
        run: ../ai-board/.github/scripts/run-agent.sh setup

      - name: Configure Git
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Execute Iteration Fixes
        id: iterate
        working-directory: target
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          BRANCH: ${{ inputs.branch }}
          PROJECT_ID: ${{ inputs.project_id }}
          ISSUES: ${{ inputs.issues_to_fix }}
        run: |
          echo "🔧 Executing iteration fixes..."
          echo "Issues to fix: $ISSUES"

          # Execute Claude iterate command
          ../ai-board/.github/scripts/run-agent.sh exec "/ai-board.iterate" > output.log || true

          # Check if changes were made
          if git diff --quiet; then
            echo "ℹ️ No changes were needed"
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Changes applied successfully"
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Global Specifications
        if: steps.iterate.outputs.no_changes != 'true'
        working-directory: target
        run: |
          echo "📚 Updating global specifications..."

          ../ai-board/.github/scripts/run-agent.sh exec "/ai-board.sync-specifications"

      - name: Commit and Push Changes
        if: steps.iterate.outputs.no_changes != 'true'
        working-directory: target
        env:
          ISSUES_TO_FIX: ${{ inputs.issues_to_fix }}
        run: |
          echo "💾 Committing iteration changes..."

          # Add all changes
          git add .

          # Create detailed commit message
          # Note: Using printf to avoid YAML parsing issues with heredoc
          COMMIT_MSG=$(printf "iterate: address verify stage feedback\n\nTicket: %s\nType: Minor iteration during VERIFY\n\nFixed issues:\n%s\n\nGenerated by AI-BOARD iterate workflow" "${{ inputs.ticket_id }}" "$ISSUES_TO_FIX")
          git commit -m "$COMMIT_MSG"
          git push origin ${{ inputs.branch }}

          echo "✅ Changes pushed to branch: ${{ inputs.branch }}"

      - name: Update Job Status - Success
        if: success()
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"

      - name: Update Job Status - Failure
        if: failure()
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status"