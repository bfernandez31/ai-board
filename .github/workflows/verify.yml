name: Verify Implementation Workflow
# Test-gated workflow that runs tests and fixes failures before PR creation

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket identifier (e.g., 016, PROJ-123)'
        required: true
        type: string

      job_id:
        description: 'Job ID for status tracking'
        required: true
        type: string

      project_id:
        description: 'Project ID for API calls'
        required: true
        type: string

      branch:
        description: 'Feature branch to verify'
        required: true
        type: string

      workflowType:
        description: 'Workflow type (FULL or QUICK)'
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Longer timeout for test execution and fixes

    permissions:
      contents: write
      pull-requests: write

    # PostgreSQL service container for testing
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_board_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SKIP_EXECUTION: ${{ contains(inputs.ticket_id, '[e2e]') }}
      SKIP_TESTS: ${{ inputs.workflowType == 'QUICK' || true}}
      APP_URL: ${{ vars.APP_URL }}
      WORKFLOW_API_TOKEN: ${{ secrets.WORKFLOW_API_TOKEN }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_board_test

    steps:
      - name: Debug Inputs
        run: |
          echo "🔍 Debug workflow inputs:"
          echo "  ticket_id: ${{ inputs.ticket_id }}"
          echo "  job_id: ${{ inputs.job_id }}"
          echo "  project_id: ${{ inputs.project_id }}"
          echo "  branch: ${{ inputs.branch }}"
          echo "  workflowType: ${{ inputs.workflowType }}"
          echo "  SKIP_TESTS: ${{ env.SKIP_TESTS }}"

      - name: Report E2E Skip
        if: ${{ env.SKIP_EXECUTION == 'true' }}
        run: |
          echo "ℹ️ '[e2e]' detected in ticket ID; skipping execution to preserve resources"

      - name: Report QUICK Workflow
        if: ${{ env.SKIP_TESTS == 'true' }}
        run: |
          echo "⚡ QUICK workflow detected (workflowType=QUICK)"
          echo "ℹ️  Skipping test execution and verification"
          echo "ℹ️  Will proceed directly to PR creation"

      - name: Update Job Status - Running
        if: ${{ inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "RUNNING"}' \
            -f -s -S || echo "⚠️ Failed to update job status to RUNNING"

      - name: Checkout repository
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Bun
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'

      - name: Setup Python
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: bun install --frozen-lockfile

      - name: Install Claude Code CLI
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: bun add -g @anthropic-ai/claude-code

      - name: Configure Git
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: |
          git config --global user.name "ai-board[bot]"
          git config --global user.email "bot@ai-board.app"

      - name: Setup Test Environment
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "🔧 Setting up test environment..."
          .github/scripts/setup-test-env.sh

      # Database setup steps
      - name: Generate Prisma Client
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        run: npx prisma generate

      - name: Apply Database Migrations
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        run: npx prisma migrate deploy

      - name: Seed Test Database
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        run: npx tsx tests/global-setup.ts

      # Playwright setup - GitHub runners have system deps pre-installed
      - name: Get Playwright Version
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
        run: npx playwright install chromium

      # Phase 1: Test Execution
      - name: Run Unit Tests
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        id: unit-tests
        continue-on-error: true
        run: |
          echo "🧪 Running unit tests..."

          # Run unit tests and capture exit code
          if bun run test:unit --reporter=json --outputFile=unit-results-full.json; then
            echo "✅ Unit tests passed"
            echo "UNIT_FAILED=false" >> "$GITHUB_ENV"
          else
            echo "❌ Unit tests failed"
            echo "UNIT_FAILED=true" >> "$GITHUB_ENV"
          fi

          # Extract only failed tests to reduce file size
          if [ -f "unit-results-full.json" ]; then
            echo "📊 Filtering unit test results to only include failures..."
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('unit-results-full.json', 'utf-8'));
              const filtered = {
                ...results,
                testResults: results.testResults?.filter(file =>
                  file.assertionResults?.some(test => test.status === 'failed')
                )
              };
              fs.writeFileSync('unit-results.json', JSON.stringify(filtered, null, 2));
              console.log(\`   Reduced from \${results.testResults?.length || 0} files to \${filtered.testResults?.length || 0} files with failures\`);
            " || cp unit-results-full.json unit-results.json
            rm -f unit-results-full.json
          fi

      - name: Run E2E Tests
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' }}
        id: e2e-tests
        continue-on-error: true
        timeout-minutes: 15  # Hard timeout at 15 minutes
        run: |
          echo "🧪 Running E2E tests with optimized CI configuration..."
          echo "   Using 4 parallel workers, 10s timeout per test"

          # Run tests with CI-optimized configuration
          # Capture only stdout (JSON) to file, stderr (logs) goes to console
          if CI=true npx playwright test --config=playwright.ci.config.ts --reporter=json > e2e-results-full.json; then
            echo "✅ E2E tests passed"
            echo "E2E_FAILED=false" >> "$GITHUB_ENV"
          else
            echo "❌ E2E tests failed (exit code: $?)"
            echo "E2E_FAILED=true" >> "$GITHUB_ENV"
          fi

          # Debug: Show file size and first few lines
          if [ -f "e2e-results-full.json" ]; then
            echo "📋 E2E results file size: $(wc -c < e2e-results-full.json) bytes"
            echo "📋 First 200 chars: $(head -c 200 e2e-results-full.json)"
          else
            echo "⚠️  E2E results file not created"
          fi

          # Check if JSON file exists and is valid
          if [ -f "e2e-results-full.json" ] && [ -s "e2e-results-full.json" ]; then
            # Validate JSON before attempting to parse
            if node -e "JSON.parse(require('fs').readFileSync('e2e-results-full.json', 'utf-8'))" 2>/dev/null; then
              echo "✅ Valid JSON detected, filtering results..."
              node -e "
                const fs = require('fs');
                try {
                  const results = JSON.parse(fs.readFileSync('e2e-results-full.json', 'utf-8'));
                  const filtered = {
                    ...results,
                    suites: results.suites?.map(suite => ({
                      ...suite,
                      specs: suite.specs?.filter(spec =>
                        spec.tests?.some(test => test.status !== 'expected')
                      )
                    })).filter(suite => suite.specs?.length > 0)
                  };
                  fs.writeFileSync('e2e-results.json', JSON.stringify(filtered, null, 2));
                  console.log(\`   Filtered: \${results.suites?.length || 0} suites → \${filtered.suites?.length || 0} suites with failures\`);
                } catch (e) {
                  console.error('   ❌ Failed to filter results:', e.message);
                  fs.copyFileSync('e2e-results-full.json', 'e2e-results.json');
                }
              "
            else
              echo "⚠️  Invalid JSON detected in e2e-results-full.json"
              echo "   This usually means Playwright crashed or timed out before generating results"
              echo "   Creating fallback error report for Claude..."

              # Extract any error messages from the corrupted JSON output
              ERROR_PREVIEW=$(grep -o "Error:.*" e2e-results-full.json 2>/dev/null | head -1 || echo "Playwright crashed without error message")

              # Create minimal error report that Claude can parse (using Node.js to avoid YAML issues)
              node -e "
                const fs = require('fs');
                const errorPreview = process.env.ERROR_PREVIEW || 'Unknown error';
                const fallbackReport = {
                  suites: [{
                    title: 'E2E Test Execution',
                    file: 'playwright.ci.config.ts',
                    specs: [{
                      title: 'Playwright Runner Failed',
                      file: 'verify workflow',
                      tests: [{
                        status: 'unexpected',
                        results: [{
                          error: {
                            message: 'Playwright failed to generate valid JSON output. This indicates a critical error during test execution. Error preview: ' + errorPreview,
                            stack: 'Check GitHub Actions logs for full Playwright output. Common causes: timeout, OOM, configuration error, missing dependencies.'
                          },
                          duration: 0
                        }]
                      }]
                    }]
                  }]
                };
                fs.writeFileSync('e2e-results.json', JSON.stringify(fallbackReport, null, 2));
              " || echo '{"suites":[]}' > e2e-results.json

              echo "   Created fallback error report for analysis"
            fi
            rm -f e2e-results-full.json
          else
            echo "⚠️  No E2E results file generated, creating empty results"
            echo '{"suites":[]}' > e2e-results.json
          fi

      # Phase 2: Generate Failure Report
      - name: Generate Test Failure Report
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' && (env.UNIT_FAILED == 'true' || env.E2E_FAILED == 'true') }}
        run: |
          echo "📊 Generating structured test failure report..."
          node .specify/scripts/generate-test-report.js \
            --unit unit-results.json \
            --e2e e2e-results.json \
            --output test-failures.json

      # Phase 3: Claude Fix Execution
      - name: Execute /verify Command
        if: ${{ env.SKIP_EXECUTION != 'true' && env.SKIP_TESTS != 'true' && (env.UNIT_FAILED == 'true' || env.E2E_FAILED == 'true') }}
        run: |
          echo "🤖 Executing /verify command to fix test failures..."
          echo ""
          echo "📋 CRITICAL CONTEXT FOR ANALYSIS:"
          echo "  ℹ️  All tests were passing on main branch (100% baseline)"
          echo "  ℹ️  Test failures are EXPECTED when implementing new features"
          echo "  💡 Your job: Determine if failure is BUG or INTENTIONAL behavior change"
          echo ""
          echo "📖 Analysis Framework:"
          echo "  1. Read specification (specs/*/spec.md) - Source of truth"
          echo "  2. Compare test expectations with spec requirements"
          echo "  3. Fix implementation if it violates spec (bugs)"
          echo "  4. Update test if spec documents new behavior (intentional changes)"
          echo ""
          claude --dangerously-skip-permissions "/verify IMPORTANT: Read test-failures.json for structured failure report. CONTEXT: Tests were passing on main (baseline). Determine if failures are BUGS (fix implementation) or INTENTIONAL behavior changes (update tests). ALWAYS read specification (specs/*/spec.md) FIRST to understand intended behavior. Compare with git diff main...HEAD. If spec says X and implementation does Y, fix implementation. If spec requires new behavior and test expects old behavior, update test. Fix systematically. Run affected tests after each fix. Only mark complete when ALL tests pass."

      - name: Commit Test Fixes
        if: ${{ env.SKIP_EXECUTION != 'true' }}
        run: |
          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No test fixes needed (all tests passed on first run)"
          else
            git commit -m "test(ticket-${{ inputs.ticket_id }}): fix test failures from /verify" \
              -m "Automated test fixes by GitHub Actions verify workflow" \
              -m "Ticket: ${{ inputs.ticket_id }}" \
              -m "Branch: ${{ inputs.branch }}"
            echo "✅ Test fixes committed"
          fi

          # Always push (Claude may have committed during /verify execution)
          git push origin "${{ inputs.branch }}"
          echo "✅ Changes pushed to branch: ${{ inputs.branch }}"

      - name: Update Job Status - Success
        if: ${{ success() && inputs.job_id && env.SKIP_EXECUTION != 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Skipped (E2E)
        if: ${{ success() && inputs.job_id && env.SKIP_EXECUTION == 'true' }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "COMPLETED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to COMPLETED"

      - name: Update Job Status - Failure
        if: ${{ failure() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "FAILED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to FAILED"

      - name: Update Job Status - Cancelled
        if: ${{ cancelled() && inputs.job_id }}
        run: |
          curl -X PATCH "${APP_URL}/api/jobs/${{ inputs.job_id }}/status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
            -d '{"status": "CANCELLED"}' \
            -f -s -S || echo "⚠️ Failed to update job status to CANCELLED"

      # Phase 5: Update Global Documentation
      - name: Update Documentation
        if: ${{ success() && env.SKIP_EXECUTION != 'true' }}
        env:
          FEATURE_BRANCH: ${{ inputs.branch }}
        run: |
          echo "📚 Updating global documentation before PR creation..."

          claude --dangerously-skip-permissions "Update the AI Board documentation based on the finalized specification in specs/${FEATURE_BRANCH}:

          This is the FINAL documentation update before PR creation. The feature has been implemented and verified.

          1. Update /specs/specifications/functional/ documentation:
             - Identify which functional file(s) need updating (01-kanban-board.md, 02-ticket-management.md, etc.)
             - Add or update the relevant sections with NEW user-facing behaviors
             - Focus on WHAT the feature does, not HOW
             - Keep descriptions from user perspective
             - Use present tense (feature is now live)

          2. Update /specs/specifications/technical/ documentation:
             - Update relevant technical files (api/endpoints.md, architecture/data-model.md, etc.)
             - Add new API endpoints, data models, schemas
             - Document implementation patterns and technical details
             - Focus on HOW it's implemented
             - Include actual code examples where relevant

          3. Update CLAUDE.md ONLY if:
             - New technologies or dependencies were added
             - New architectural patterns were introduced
             - New conventions need to be documented
             - New testing patterns were established

          Remember: Documentation should reflect CURRENT STATE only, no historical information.
          Don't commit the changes."

          git add specs/specifications/ CLAUDE.md
          if ! git diff --staged --quiet; then
            git commit -m "docs(ticket-${{ inputs.ticket_id }}): update documentation

          - Updated functional specs with new user-facing behaviors
          - Updated technical docs with implementation details
          - Maintained current state documentation (no history)

          Final documentation update before PR creation."
            git push origin "${{ inputs.branch }}"
            echo "✅ Documentation updated and committed"
          else
            echo "ℹ️ No documentation changes needed"
          fi

      # Phase 6: PR Creation (ONLY if all tests pass)
      - name: Create Pull Request
        if: ${{ success() && env.SKIP_EXECUTION != 'true' }}
        env:
          TICKET_ID: ${{ inputs.ticket_id }}
          PROJECT_ID: ${{ inputs.project_id }}
          FEATURE_BRANCH: ${{ inputs.branch }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🚀 All tests passed! Creating PR..."
          echo "   Note: Ticket is already in VERIFY stage, no transition needed"
          .specify/scripts/bash/create-pr-only.sh \
            "${TICKET_ID}" \
            "${PROJECT_ID}" \
            "${FEATURE_BRANCH}" \
            "${APP_URL}" \
            "${WORKFLOW_API_TOKEN}"

      - name: Report Success (Skipped)
        if: ${{ success() && env.SKIP_EXECUTION == 'true' }}
        run: |
          echo "✅ Verify workflow skipped because ticket contains '[e2e]'"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"

      - name: Report Success
        if: ${{ success() && env.SKIP_EXECUTION != 'true' }}
        run: |
          echo "✅ Verification completed successfully"
          echo "📍 Branch: ${{ inputs.branch }}"
          echo "🎫 Ticket: ${{ inputs.ticket_id }}"
          echo "🧪 All tests passed"
          echo "📋 Pull Request created and ready for review"

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Verification failed"
          echo "📋 Check logs above for error details"
          echo "💡 Tests may still be failing after /verify command execution"
          exit 1
