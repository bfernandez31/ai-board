openapi: 3.1.0
info:
  title: Personal Access Tokens API
  description: API endpoints for managing user Personal Access Tokens
  version: 1.0.0

paths:
  /api/tokens:
    get:
      summary: List user's tokens
      description: Returns all personal access tokens for the authenticated user
      operationId: listTokens
      security:
        - sessionAuth: []
      responses:
        '200':
          description: List of tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: '#/components/schemas/TokenListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create new token
      description: Generate a new personal access token. The full token is returned only once.
      operationId: createToken
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
      responses:
        '201':
          description: Token created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/tokens/{id}:
    delete:
      summary: Delete token
      description: Permanently revoke and delete a personal access token
      operationId: deleteToken
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Token ID
          schema:
            type: integer
      responses:
        '200':
          description: Token deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth.js session cookie

    bearerToken:
      type: http
      scheme: bearer
      description: Personal Access Token (format pat_xxxxx...)

  schemas:
    TokenListItem:
      type: object
      required:
        - id
        - name
        - preview
        - createdAt
      properties:
        id:
          type: integer
          description: Token unique identifier
          example: 1
        name:
          type: string
          description: User-provided token name
          example: My MCP Server
        preview:
          type: string
          description: Last 4 characters of token for identification
          example: "a1b2"
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
          description: When the token was last used for authentication
          example: "2026-01-23T10:30:00Z"
        createdAt:
          type: string
          format: date-time
          description: When the token was created
          example: "2026-01-20T08:00:00Z"

    CreateTokenRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User-provided name to identify this token
          example: CI Pipeline

    CreateTokenResponse:
      type: object
      required:
        - id
        - name
        - token
        - preview
        - createdAt
      properties:
        id:
          type: integer
          description: Token unique identifier
          example: 1
        name:
          type: string
          description: Token name
          example: CI Pipeline
        token:
          type: string
          description: |
            The full personal access token.
            WARNING: This is shown only once. Store it securely.
          example: pat_abc123def456ghi789jkl012mno345pqr678stu901vwx234yz5678
        preview:
          type: string
          description: Last 4 characters for future reference
          example: "5678"
        createdAt:
          type: string
          format: date-time
          description: Token creation timestamp
          example: "2026-01-23T12:00:00Z"

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized

    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Token name is required

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Token not found
