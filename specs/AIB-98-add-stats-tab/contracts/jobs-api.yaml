# OpenAPI Contract: Extended Jobs API for Stats Tab
# Feature: AIB-98-add-stats-tab
# Date: 2025-12-06

openapi: 3.0.3
info:
  title: AI Board Jobs API - Stats Extension
  description: Extended job data endpoint for Stats tab telemetry
  version: 1.0.0

paths:
  /api/projects/{projectId}/tickets/{ticketId}/jobs:
    get:
      summary: Get jobs for a ticket
      description: |
        Returns jobs associated with a ticket. When `includeStats=true`,
        returns full telemetry data for stats display.
      operationId: getTicketJobs
      tags:
        - Jobs
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Project ID
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Ticket ID
        - name: includeStats
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, includes full telemetry fields for stats display
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/TicketJobWithStats'
        '401':
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - user lacks project access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ticket or project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    TicketJobWithStats:
      type: object
      required:
        - id
        - command
        - status
        - startedAt
        - toolsUsed
      properties:
        id:
          type: integer
          minimum: 1
          description: Unique job identifier
          example: 42
        command:
          type: string
          minLength: 1
          description: Workflow command executed
          example: "implement"
          enum:
            - specify
            - plan
            - implement
            - verify
            - quick-impl
            - clean
            - deploy-preview
            - rollback-reset
            - comment-specify
            - comment-plan
            - comment-build
            - comment-verify
        status:
          type: string
          description: Current job status
          enum:
            - PENDING
            - RUNNING
            - COMPLETED
            - FAILED
            - CANCELLED
          example: "COMPLETED"
        startedAt:
          type: string
          format: date-time
          description: Job start timestamp (ISO 8601)
          example: "2025-12-06T10:30:00.000Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Job completion timestamp (ISO 8601), null if not completed
          example: "2025-12-06T10:30:45.000Z"
        inputTokens:
          type: integer
          minimum: 0
          nullable: true
          description: Total input tokens consumed by Claude API
          example: 15000
        outputTokens:
          type: integer
          minimum: 0
          nullable: true
          description: Total output tokens generated by Claude API
          example: 3500
        cacheReadTokens:
          type: integer
          minimum: 0
          nullable: true
          description: Tokens read from cache
          example: 8000
        cacheCreationTokens:
          type: integer
          minimum: 0
          nullable: true
          description: Tokens written to cache
          example: 2000
        costUsd:
          type: number
          format: float
          minimum: 0
          nullable: true
          description: Total cost in USD
          example: 0.22
        durationMs:
          type: integer
          minimum: 0
          nullable: true
          description: Total duration in milliseconds
          example: 45000
        model:
          type: string
          nullable: true
          description: Primary AI model used
          example: "claude-sonnet-4-20250514"
        toolsUsed:
          type: array
          items:
            type: string
          description: List of tools used during job execution
          example: ["Edit", "Read", "Bash", "Write"]

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
          example: "Ticket not found"
        code:
          type: string
          description: Optional error code
          example: "NOT_FOUND"

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth.js session cookie

security:
  - sessionAuth: []
