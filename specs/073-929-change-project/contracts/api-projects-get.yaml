openapi: 3.0.0
info:
  title: Projects API - Enhanced with Shipped Ticket Data
  version: 2.0.0
  description: |
    API contract for GET /api/projects endpoint with last shipped ticket information.
    This version adds deployment URL, GitHub repository details, and last shipped ticket.

paths:
  /api/projects:
    get:
      summary: Get all projects for authenticated user
      description: |
        Returns all projects where user is owner OR member, including:
        - Total ticket count across all stages
        - Last shipped ticket (most recent ticket in SHIP stage)
        - Deployment URL (if configured)
        - GitHub repository information

      operationId: getUserProjects
      tags:
        - Projects

      security:
        - sessionCookie: []

      responses:
        '200':
          description: Successfully retrieved projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectWithCount'
              examples:
                withShippedTicket:
                  summary: Project with shipped tickets
                  value:
                    - id: 1
                      name: "AI Board Development"
                      description: "Main development project for AI-powered kanban board"
                      githubOwner: "bfernandez31"
                      githubRepo: "ai-board"
                      deploymentUrl: "https://ai-board.vercel.app"
                      updatedAt: "2025-10-29T10:30:00Z"
                      ticketCount: 25
                      lastShippedTicket:
                        id: 42
                        title: "Add real-time job status updates"
                        updatedAt: "2025-10-29T08:15:00Z"

                noShippedTickets:
                  summary: Project with no shipped tickets
                  value:
                    - id: 2
                      name: "New Feature Branch"
                      description: "Testing new workflow features"
                      githubOwner: "bfernandez31"
                      githubRepo: "test-repo"
                      deploymentUrl: null
                      updatedAt: "2025-10-28T14:20:00Z"
                      ticketCount: 5
                      lastShippedTicket: null

                noTickets:
                  summary: Empty project
                  value:
                    - id: 3
                      name: "Fresh Project"
                      description: "Just created, no tickets yet"
                      githubOwner: "bfernandez31"
                      githubRepo: "fresh-start"
                      deploymentUrl: null
                      updatedAt: "2025-10-29T12:00:00Z"
                      ticketCount: 0
                      lastShippedTicket: null

        '401':
          description: Unauthorized - No valid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                code: "AUTH_ERROR"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Failed to fetch projects"
                code: "DATABASE_ERROR"

components:
  schemas:
    ProjectWithCount:
      type: object
      required:
        - id
        - name
        - description
        - githubOwner
        - githubRepo
        - deploymentUrl
        - updatedAt
        - ticketCount
        - lastShippedTicket
      properties:
        id:
          type: integer
          format: int32
          description: Unique project identifier
          example: 1

        name:
          type: string
          maxLength: 100
          description: Project display name
          example: "AI Board Development"

        description:
          type: string
          maxLength: 1000
          description: Project description (NOTE: Not displayed on card, kept for backwards compatibility)
          example: "Main development project for AI-powered kanban board"

        githubOwner:
          type: string
          maxLength: 100
          description: GitHub repository owner/organization
          example: "bfernandez31"

        githubRepo:
          type: string
          maxLength: 100
          description: GitHub repository name
          example: "ai-board"

        deploymentUrl:
          type: string
          format: uri
          maxLength: 500
          nullable: true
          description: Production/staging deployment URL (null if not configured)
          example: "https://ai-board.vercel.app"

        updatedAt:
          type: string
          format: date-time
          description: Last project update timestamp (ISO 8601)
          example: "2025-10-29T10:30:00Z"

        ticketCount:
          type: integer
          format: int32
          minimum: 0
          description: Total number of tickets across all stages
          example: 25

        lastShippedTicket:
          nullable: true
          description: Most recent ticket in SHIP stage (null if no tickets shipped)
          oneOf:
            - $ref: '#/components/schemas/ShippedTicketSummary'
            - type: 'null'

    ShippedTicketSummary:
      type: object
      required:
        - id
        - title
        - updatedAt
      properties:
        id:
          type: integer
          format: int32
          description: Ticket identifier
          example: 42

        title:
          type: string
          maxLength: 100
          description: Ticket title
          example: "Add real-time job status updates"

        updatedAt:
          type: string
          format: date-time
          description: When ticket was last updated (used for relative time)
          example: "2025-10-29T08:15:00Z"

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "Failed to fetch projects"

        code:
          type: string
          description: Machine-readable error code
          example: "DATABASE_ERROR"
          enum:
            - AUTH_ERROR
            - DATABASE_ERROR
            - VALIDATION_ERROR

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth.js session cookie for authenticated requests
