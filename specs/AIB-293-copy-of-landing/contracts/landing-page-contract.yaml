openapi: 3.1.0
info:
  title: Landing Page Content Contract
  version: 1.0.0
  description: >
    Design-time contract for the public AI Board landing page refresh. This contract
    documents the expected structure, CTA behavior, trust signals, and accessibility
    requirements for the server-rendered marketing homepage.
servers:
  - url: /
paths:
  /:
    get:
      summary: Render the public landing page
      description: >
        Returns the unauthenticated marketing homepage. Authenticated users are
        redirected by the root route before this page is shown.
      operationId: getLandingPage
      tags:
        - Marketing
      responses:
        '200':
          description: Landing page content is rendered for unauthenticated visitors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LandingPageContract'
              examples:
                default:
                  value:
                    route: /
                    sectionOrder:
                      - hero
                      - proof
                      - workflow
                      - capabilities
                      - pricing
                      - final-cta
                    primaryCta:
                      label: Get Started Free
                      href: /auth/signin
                    secondaryCta:
                      label: Explore Workflow
                      href: '#workflow'
        '307':
          description: Authenticated visitor is redirected to the application area.
components:
  schemas:
    LandingPageContract:
      type: object
      required:
        - route
        - sectionOrder
        - sections
        - primaryCta
      properties:
        route:
          type: string
          const: /
        sectionOrder:
          type: array
          minItems: 4
          items:
            type: string
        sections:
          type: array
          minItems: 4
          items:
            $ref: '#/components/schemas/LandingSection'
        primaryCta:
          $ref: '#/components/schemas/CallToAction'
        secondaryCta:
          $ref: '#/components/schemas/CallToAction'
        accessibility:
          $ref: '#/components/schemas/AccessibilityRequirements'
    LandingSection:
      type: object
      required:
        - id
        - heading
        - purpose
        - messageOutcome
      properties:
        id:
          type: string
        heading:
          type: string
        eyebrow:
          type:
            - string
            - 'null'
        purpose:
          type: string
          enum:
            - INTRODUCTION
            - PROOF
            - CAPABILITY
            - WORKFLOW
            - PRICING
            - CONVERSION
        messageOutcome:
          type: string
        ctas:
          type: array
          items:
            $ref: '#/components/schemas/CallToAction'
        trustSignals:
          type: array
          items:
            $ref: '#/components/schemas/TrustSignal'
        motion:
          $ref: '#/components/schemas/MotionBehavior'
    CallToAction:
      type: object
      required:
        - label
        - href
        - priority
      properties:
        label:
          type: string
        href:
          type: string
        priority:
          type: string
          enum:
            - PRIMARY
            - SECONDARY
        visibleOn:
          type: array
          items:
            type: string
            enum:
              - mobile
              - tablet
              - desktop
    TrustSignal:
      type: object
      required:
        - title
        - description
        - sourceType
      properties:
        title:
          type: string
        description:
          type: string
        sourceType:
          type: string
          enum:
            - WORKFLOW_SPECIFICITY
            - PRODUCT_ARTIFACT
            - PRICING_CLARITY
            - SUPPORTABLE_CLAIM
    MotionBehavior:
      type: object
      required:
        - mode
        - reducedMotionFallback
      properties:
        mode:
          type: string
          enum:
            - NONE
            - OPTIONAL
            - DECORATIVE_REDUCED_SAFE
        reducedMotionFallback:
          type: string
          enum:
            - DISABLE
            - SIMPLIFY
            - STATIC_FALLBACK
    AccessibilityRequirements:
      type: object
      required:
        - keyboardReachablePrimaryActions
        - logicalFocusOrder
        - reducedMotionSafe
        - noHorizontalScrollAtCriticalBreakpoints
      properties:
        keyboardReachablePrimaryActions:
          type: boolean
          const: true
        logicalFocusOrder:
          type: boolean
          const: true
        reducedMotionSafe:
          type: boolean
          const: true
        noHorizontalScrollAtCriticalBreakpoints:
          type: boolean
          const: true
