openapi: 3.1.0
info:
  title: Ticket Comparison Dashboard API
  version: 1.0.0
  description: Structured comparison history and detail APIs for AIB-325.
servers:
  - url: https://example.com
paths:
  /api/projects/{projectId}/tickets/{ticketId}/comparisons:
    get:
      summary: List saved comparisons for a ticket
      operationId: listTicketComparisons
      tags:
        - Comparisons
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TicketId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Structured comparison history for the requested ticket
          content:
            application/json:
              example:
                comparisons:
                  - id: 12
                    generatedAt: '2026-03-20T09:00:00.000Z'
                    sourceTicketKey: AIB-101
                    participantTicketKeys:
                      - AIB-102
                      - AIB-103
                    winnerTicketKey: AIB-102
                    summary: Winner ticket had the best test coverage and smallest diff.
                    recommendation: Choose AIB-102 for the implementation baseline.
                total: 1
                limit: 10
              schema:
                type: object
                required:
                  - comparisons
                  - total
                  - limit
                properties:
                  comparisons:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComparisonHistoryItem'
                  total:
                    type: integer
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/projects/{projectId}/tickets/{ticketId}/comparisons/check:
    get:
      summary: Check whether a ticket has any saved comparisons
      operationId: checkTicketComparisons
      tags:
        - Comparisons
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TicketId'
      responses:
        '200':
          description: Lightweight comparison existence payload for ticket detail entry-point rendering
          content:
            application/json:
              example:
                hasComparisons: true
                count: 2
                latestComparisonId: 12
              schema:
                type: object
                required:
                  - hasComparisons
                  - count
                  - latestComparisonId
                properties:
                  hasComparisons:
                    type: boolean
                  count:
                    type: integer
                    minimum: 0
                  latestComparisonId:
                    type:
                      - integer
                      - 'null'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/projects/{projectId}/tickets/{ticketId}/comparisons/{comparisonId}:
    get:
      summary: Get the structured comparison dashboard payload for one saved comparison
      operationId: getTicketComparisonDetail
      tags:
        - Comparisons
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TicketId'
        - name: comparisonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Structured comparison detail with saved analysis and live enrichments
          content:
            application/json:
              example:
                id: 12
                generatedAt: '2026-03-20T09:00:00.000Z'
                sourceTicketId: 101
                sourceTicketKey: AIB-101
                markdownPath: specs/feature-branch/comparisons/example.md
                summary: Winner ticket had the best test coverage and smallest diff.
                overallRecommendation: Choose AIB-102 for the implementation baseline.
                keyDifferentiators:
                  - coverage
                  - smaller diff
                winnerTicketId: 102
                winnerTicketKey: AIB-102
                participants:
                  - ticketId: 102
                    ticketKey: AIB-102
                    title: Winner ticket
                    stage: VERIFY
                    workflowType: FULL
                    agent: null
                    rank: 1
                    score: 91
                    rankRationale: Strong verify results and concise implementation.
                    quality:
                      state: available
                      value: 91
                    telemetry:
                      inputTokens:
                        state: available
                        value: 1200
                      outputTokens:
                        state: available
                        value: 400
                      durationMs:
                        state: available
                        value: 120000
                      costUsd:
                        state: available
                        value: 0.08
                    metrics:
                      linesAdded: 20
                      linesRemoved: 5
                      linesChanged: 25
                      filesChanged: 3
                      testFilesChanged: 2
                      changedFiles:
                        - app/a.ts
                      bestValueFlags:
                        linesChanged: true
                decisionPoints:
                  - id: 1
                    title: State handling
                    verdictTicketId: 102
                    verdictSummary: AIB-102 handled pending states cleanly.
                    rationale: The winner kept unavailable telemetry explicit.
                    displayOrder: 0
                    participantApproaches:
                      - ticketId: 102
                        ticketKey: AIB-102
                        summary: Used explicit pending/unavailable states.
                complianceRows:
                  - principleKey: typescript-first-development
                    principleName: TypeScript-First Development
                    displayOrder: 0
                    assessments:
                      - participantTicketId: 102
                        participantTicketKey: AIB-102
                        status: pass
                        notes: Strict types retained.
              schema:
                $ref: '#/components/schemas/ComparisonDetailResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    TicketId:
      name: ticketId
      in: path
      required: true
      schema:
        type: integer

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: User lacks access to the requested project or ticket
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Project, ticket, or comparison not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        code:
          type:
            - string
            - 'null'

    ComparisonHistoryItem:
      type: object
      required:
        - id
        - generatedAt
        - sourceTicketKey
        - participantTicketKeys
        - winnerTicketKey
        - summary
      properties:
        id:
          type: integer
        generatedAt:
          type: string
          format: date-time
        sourceTicketKey:
          type: string
        participantTicketKeys:
          type: array
          items:
            type: string
        winnerTicketKey:
          type: string
        summary:
          type: string
        recommendation:
          type: string

    NullableEnrichmentValue:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - available
            - pending
            - unavailable
        value:
          type:
            - integer
            - number
            - string
            - 'null'

    TelemetryEnrichment:
      type: object
      required:
        - inputTokens
        - outputTokens
        - durationMs
        - costUsd
      properties:
        inputTokens:
          $ref: '#/components/schemas/NullableEnrichmentValue'
        outputTokens:
          $ref: '#/components/schemas/NullableEnrichmentValue'
        durationMs:
          $ref: '#/components/schemas/NullableEnrichmentValue'
        costUsd:
          $ref: '#/components/schemas/NullableEnrichmentValue'

    ParticipantMetrics:
      type: object
      required:
        - changedFiles
        - bestValueFlags
      properties:
        linesAdded:
          type:
            - integer
            - 'null'
        linesRemoved:
          type:
            - integer
            - 'null'
        linesChanged:
          type:
            - integer
            - 'null'
        filesChanged:
          type:
            - integer
            - 'null'
        testFilesChanged:
          type:
            - integer
            - 'null'
        changedFiles:
          type: array
          items:
            type: string
        bestValueFlags:
          type: object
          additionalProperties:
            type: boolean

    ParticipantLiveEnrichment:
      type: object
      required:
        - ticketId
        - ticketKey
        - title
        - stage
        - workflowType
        - agent
        - rank
        - score
        - rankRationale
        - quality
        - telemetry
        - metrics
      properties:
        ticketId:
          type: integer
        ticketKey:
          type: string
        title:
          type: string
        stage:
          type: string
        workflowType:
          type: string
        agent:
          type:
            - string
            - 'null'
        rank:
          type: integer
        score:
          type: integer
        rankRationale:
          type: string
        quality:
          $ref: '#/components/schemas/NullableEnrichmentValue'
        telemetry:
          $ref: '#/components/schemas/TelemetryEnrichment'
        metrics:
          $ref: '#/components/schemas/ParticipantMetrics'

    DecisionPoint:
      type: object
      required:
        - id
        - title
        - verdictTicketId
        - verdictSummary
        - rationale
        - displayOrder
        - participantApproaches
      properties:
        id:
          type: integer
        title:
          type: string
        verdictTicketId:
          type:
            - integer
            - 'null'
        verdictSummary:
          type: string
        rationale:
          type: string
        displayOrder:
          type: integer
        participantApproaches:
          type: array
          items:
            type: object
            required:
              - ticketId
              - ticketKey
              - summary
            properties:
              ticketId:
                type: integer
              ticketKey:
                type: string
              summary:
                type: string

    ComplianceCell:
      type: object
      required:
        - participantTicketId
        - participantTicketKey
        - status
        - notes
      properties:
        participantTicketId:
          type: integer
        participantTicketKey:
          type: string
        status:
          type: string
          enum:
            - pass
            - mixed
            - fail
        notes:
          type: string

    ComplianceRow:
      type: object
      required:
        - principleKey
        - principleName
        - displayOrder
        - assessments
      properties:
        principleKey:
          type: string
        principleName:
          type: string
        displayOrder:
          type: integer
        assessments:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceCell'

    ComparisonDetailResponse:
      type: object
      required:
        - id
        - generatedAt
        - sourceTicketId
        - sourceTicketKey
        - markdownPath
        - summary
        - overallRecommendation
        - keyDifferentiators
        - winnerTicketId
        - winnerTicketKey
        - participants
        - decisionPoints
        - complianceRows
      properties:
        id:
          type: integer
        generatedAt:
          type: string
          format: date-time
        sourceTicketId:
          type: integer
        sourceTicketKey:
          type: string
        markdownPath:
          type: string
        summary:
          type: string
        overallRecommendation:
          type: string
        keyDifferentiators:
          type: array
          items:
            type: string
        winnerTicketId:
          type: integer
        winnerTicketKey:
          type: string
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantLiveEnrichment'
        decisionPoints:
          type: array
          items:
            $ref: '#/components/schemas/DecisionPoint'
        complianceRows:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceRow'
