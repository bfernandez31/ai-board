openapi: 3.0.3
info:
  title: Delete Ticket Image API
  description: Removes image from ticket attachments array and optionally deletes file from GitHub
  version: 1.0.0

paths:
  /api/projects/{projectId}/tickets/{ticketId}/images/{attachmentIndex}:
    delete:
      summary: Delete image from ticket
      description: |
        Removes image metadata from ticket.attachments array at specified index.
        Optionally deletes file from GitHub repository (implementation detail).
        Uses optimistic concurrency control via version field.
      operationId: deleteTicketImage
      tags:
        - Images
      parameters:
        - name: projectId
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            minimum: 1
        - name: ticketId
          in: path
          required: true
          description: Ticket ID
          schema:
            type: integer
            minimum: 1
        - name: attachmentIndex
          in: path
          required: true
          description: Index of attachment in ticket.attachments array
          schema:
            type: integer
            minimum: 0
            maximum: 99
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - version
              properties:
                version:
                  type: integer
                  minimum: 1
                  description: Current ticket version for concurrency control
            example:
              version: 6
      responses:
        '200':
          description: Image deleted successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - attachments
                  - version
                properties:
                  attachments:
                    type: array
                    description: Updated attachments array without deleted image
                    items:
                      $ref: '#/components/schemas/TicketAttachment'
                  version:
                    type: integer
                    description: New ticket version after update
              example:
                attachments:
                  - type: "uploaded"
                    url: "https://github.com/owner/repo/blob/main/images/123/screenshot.png"
                    filename: "screenshot.png"
                    mimeType: "image/png"
                    sizeBytes: 245678
                    uploadedAt: "2025-01-21T14:30:00.000Z"
                version: 7
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid attachment index"
        '401':
          description: Unauthorized - no valid session
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Unauthorized"
        '403':
          description: Forbidden - cannot edit images in current stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Forbidden - cannot edit images in BUILD stage"
        '404':
          description: Ticket or image not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                ticketNotFound:
                  value:
                    error: "Ticket not found"
                imageNotFound:
                  value:
                    error: "Image not found at index 5"
        '409':
          description: Conflict - ticket was modified by another user
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Conflict - ticket was modified by another user"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Internal server error"

components:
  schemas:
    TicketAttachment:
      type: object
      required:
        - type
        - url
        - filename
        - mimeType
        - sizeBytes
        - uploadedAt
      properties:
        type:
          type: string
          enum:
            - uploaded
            - external
          description: Source type of attachment
        url:
          type: string
          format: uri
          description: GitHub URL (uploaded) or external URL (external)
        filename:
          type: string
          maxLength: 255
          description: Original filename or alt text
        mimeType:
          type: string
          enum:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
          description: MIME type of image
        sizeBytes:
          type: integer
          minimum: 0
          maximum: 10485760
          description: File size in bytes (0 for external URLs)
        uploadedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when attachment was created

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: NextAuth.js session cookie
