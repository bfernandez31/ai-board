## Error Handling Contract

### Infrastructure Failure Scenarios

**PostgreSQL Service Fails**:
```yaml
- name: Verify PostgreSQL Ready
  if: ${{ inputs.command == 'implement' }}
  run: |
    if ! pg_isready -h localhost -p 5432 -U postgres; then
      echo "❌ PostgreSQL service failed to start"
      exit 1
    fi
```

**Playwright Installation Fails**:
- Workflow MUST fail with clear error message
- Error MUST indicate which browser download failed
- Retry NOT recommended (cache corruption may persist)

**Migration Fails**:
- Workflow MUST fail fast (don't proceed to Claude execution)
- Error MUST include migration name that failed
- Job status MUST be set to FAILED

