## Job Status Updates (No Changes)

### Status Transition Contract

**Existing Pattern** (maintained):
```bash
# Running status (when workflow starts)
curl -X PATCH "${APP_URL}/api/jobs/${job_id}/status" \
  -H "Authorization: Bearer ${WORKFLOW_API_TOKEN}" \
  -d '{"status": "RUNNING"}'

