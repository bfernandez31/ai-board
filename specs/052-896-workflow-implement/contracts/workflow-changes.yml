# Contract: GitHub Actions Workflow Changes for `/speckit.implement`

**File**: `.github/workflows/speckit.yml`
**Purpose**: Define expected workflow structure for database and Playwright setup on implement command
**Date**: 2025-10-25

---

## Service Container Configuration

### PostgreSQL Service (New)

**Location**: `jobs.run-speckit.services` section
**Trigger Condition**: Only when `inputs.command == 'implement'`

```yaml
services:
  postgres:
    image: postgres:14
    ports:
      - '5432:5432'
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_board_test
    options: >-
      --health-cmd pg_isready
      --health-interval 10s
      --health-timeout 5s
      --health-retries 5
```

**Contract Requirements**:
- ✅ PostgreSQL 14+ image (stable, production-compatible version)
- ✅ Port 5432 mapped to localhost (standard PostgreSQL port)
- ✅ Credentials match DATABASE_URL format (user: postgres, password: postgres)
- ✅ Database name `ai_board_test` (clearly indicates test environment)
- ✅ Health checks ensure database ready before migrations
- ✅ Health check retries (5x) with 10s interval for reliability

**Validation**:
- Service must be accessible at `localhost:5432` after health checks pass
- `pg_isready` command must succeed before workflow continues

