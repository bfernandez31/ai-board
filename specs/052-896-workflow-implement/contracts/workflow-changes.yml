## Testing Contract

### Workflow Validation

**Acceptance Tests**:
1. **PostgreSQL Service**: Verify `pg_isready` succeeds after health checks
2. **Migrations**: Verify all migrations from `prisma/migrations/` applied
3. **Seeding**: Verify test user and projects 1-2 exist in database
4. **Playwright**: Verify browsers installed and E2E tests can execute
5. **Selective Tests**: Verify Claude runs only modified test files (not full suite)

**Test Execution**:
- Create test ticket in INBOX stage
- Transition to BUILD with `command: implement`
- Verify workflow completes successfully
- Verify implementation committed to feature branch
- Verify selective tests executed (check logs for test file paths)

