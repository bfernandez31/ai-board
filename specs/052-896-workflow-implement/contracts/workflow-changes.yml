## Workflow Steps (New/Modified)

### Step: Cache Bun Dependencies (New)

**Location**: After "Setup Bun" step, before database setup
**Trigger Condition**: All commands (not implement-specific)

```yaml
- name: Cache Bun dependencies
  uses: actions/cache@v4
  with:
    path: node_modules
    key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
    restore-keys: |
      ${{ runner.os }}-bun-
```

**Contract Requirements**:
- ✅ Cache key includes `bun.lockb` hash (invalidates on dependency changes)
- ✅ Restore key fallback for partial cache hits
- ✅ Reduces dependency installation from ~2 min to ~10 sec (cache hit)

---

### Step: Install Dependencies (Modified)

**Location**: After cache step
**Trigger Condition**: All commands

```yaml
- name: Install dependencies
  run: bun install --frozen-lockfile
```

**Contract Requirements**:
- ✅ `--frozen-lockfile` prevents lockfile modifications (CI-safe)
- ✅ Runs after cache restoration (uses cached node_modules if available)
- ✅ Required before Prisma CLI usage (Prisma dependency)

---

### Step: Get Playwright Version (New)

**Location**: After dependency installation, before Playwright cache
**Trigger Condition**: Only when `inputs.command == 'implement'`

```yaml
- name: Get Playwright version
  if: ${{ inputs.command == 'implement' }}
  id: playwright-version
  run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT
```

**Contract Requirements**:
- ✅ Extracts Playwright version from package.json
- ✅ Sets output variable for cache key generation
- ✅ Node.js must be available (requires prior "Setup Node.js" step)

---

### Step: Cache Playwright Browsers (New)

**Location**: After Playwright version extraction
**Trigger Condition**: Only when `inputs.command == 'implement'`

```yaml
- name: Cache Playwright browsers
  if: ${{ inputs.command == 'implement' }}
  uses: actions/cache@v4
  id: playwright-cache
  with:
    path: ~/.cache/ms-playwright
    key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
```

**Contract Requirements**:
- ✅ Cache key includes Playwright version (invalidates on version upgrade)
- ✅ Cache ID `playwright-cache` for conditional installation step
- ✅ Reduces installation from ~3.5 min to ~45 sec (cache hit)

---

### Step: Install Playwright Browsers (New)

**Location**: After Playwright cache
**Trigger Condition**: Only when `inputs.command == 'implement'` AND cache miss

```yaml
- name: Install Playwright browsers
  if: ${{ inputs.command == 'implement' && steps.playwright-cache.outputs.cache-hit != 'true' }}
  run: npx playwright install --with-deps
```

**Contract Requirements**:
- ✅ Only runs on cache miss (skips when browsers cached)
- ✅ `--with-deps` installs OS dependencies (required on Linux)
- ✅ Full installation time ~3.5 minutes (acceptable for cold start)

---

### Step: Install Playwright OS Dependencies (New)

**Location**: After Playwright browser installation
**Trigger Condition**: Only when `inputs.command == 'implement'` AND cache hit

```yaml
- name: Install Playwright OS dependencies
  if: ${{ inputs.command == 'implement' && steps.playwright-cache.outputs.cache-hit == 'true' }}
  run: npx playwright install-deps
```

**Contract Requirements**:
- ✅ Only runs on cache hit (when browsers cached but deps not)
- ✅ Installs only OS dependencies (faster than full install)
- ✅ Required because OS deps cannot be cached on Linux

---

### Step: Generate Prisma Client (New)

**Location**: After Playwright setup, before migrations
**Trigger Condition**: Only when `inputs.command == 'implement'`

```yaml
- name: Generate Prisma Client
  if: ${{ inputs.command == 'implement' }}
  run: npx prisma generate
```

**Contract Requirements**:
- ✅ Regenerates type-safe Prisma Client from schema.prisma
- ✅ Required before migrations (Prisma CLI needs client)
- ✅ Time: ~30 seconds

---

### Step: Apply Database Migrations (New)

**Location**: After Prisma Client generation
**Trigger Condition**: Only when `inputs.command == 'implement'`

```yaml
- name: Apply database migrations
  if: ${{ inputs.command == 'implement' }}
  run: npx prisma migrate deploy
  env:
    DATABASE_URL: ${{ env.DATABASE_URL }}
```

**Contract Requirements**:
- ✅ Uses `migrate deploy` (non-interactive, CI-safe)
- ✅ Applies all pending migrations from `prisma/migrations/`
- ✅ Idempotent (safe to run multiple times)
- ✅ Time: <1 minute

**Failure Handling**:
- Workflow MUST fail fast if migrations fail (database unavailable)
- Error message MUST indicate migration failure clearly

---

### Step: Seed Test Database (New)

**Location**: After database migrations
**Trigger Condition**: Only when `inputs.command == 'implement'`

```yaml
- name: Seed test database
  if: ${{ inputs.command == 'implement' }}
  run: npx tsx tests/global-setup.ts
  env:
    DATABASE_URL: ${{ env.DATABASE_URL }}
```

**Contract Requirements**:
- ✅ Calls existing global-setup.ts script
- ✅ Creates test user (test@e2e.local)
- ✅ Creates test projects (1, 2)
- ✅ Cleans leftover test data
- ✅ Time: ~30 seconds

**Outputs**:
- `.test-user-id` file created with test user ID
- Used by Playwright for mock authentication header

---

### Step: Execute Spec-Kit Command (Modified)

**Location**: Existing step, modify implement case
**Trigger Condition**: All commands (implement case modified)

```yaml
- name: Execute Spec-Kit Command
  run: |
    case "${{ inputs.command }}" in
      specify)
        # ... existing specify logic ...
        ;;
      plan)
        # ... existing plan logic ...
        ;;
      implement)
        claude --dangerously-skip-permissions "/speckit.implement IMPORTANT: never prompt me; you must do the full implementation, never run the full test suite, only impacted tests"
        ;;
      # ... other cases ...
    esac
```

**Contract Requirements**:
- ✅ Enhanced command instruction includes explicit directives
- ✅ "never prompt me" → autonomous implementation (no user input)
- ✅ "never run the full test suite" → selective test execution
- ✅ "only impacted tests" → test selection heuristics

**Environment Available to Claude**:
- `DATABASE_URL`: PostgreSQL connection string
- `NODE_ENV`: Set to development (for mock auth)
- Playwright browsers installed and ready

